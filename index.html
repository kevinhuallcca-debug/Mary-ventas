function guardarAsisUnica(personalId, nombre, estado, fecha, porcentaje){
  var existentes=asistencias.filter(function(a){return a.personalId===personalId&&a.fecha===fecha;});
  var promises=existentes.map(function(a){return db.ref('asistencias/'+a.id).remove();});
  var data={personalId:personalId,nombre:nombre,estado:estado,fecha:fecha,hora:nowTime(),timestamp:new Date().toISOString()};
  if(estado==='medio tiempo'){data.porcentaje=porcentaje||50;}
  Promise.all(promises).then(function(){
    db.ref('asistencias').push(data).then(function(){
      var label=estado==='medio tiempo'?estado+' ('+data.porcentaje+'%)':estado;
      showToast(nombre+' — '+label);
    });
  });
}

// ── Helpers panel medio tiempo ────────────────────────────────
window._pctMedio=50;
function toggleMedioTiempoPanel(){
  var panel=document.getElementById('medio-tiempo-panel');
  if(!panel)return;
  var visible=panel.style.display!=='none';
  panel.style.display=visible?'none':'block';
  if(!visible){
    var emp=personal.find(function(p){return p.id===window._modalEmpId;});
    var sueldo=emp?(emp.sueldoDia||emp.sueldo||0):0;
    var inp=document.getElementById('mt-monto');
    if(inp){
      // Recordar el último valor que ingresó el usuario (por empleado)
      var ultimoMonto=null;
      try{ultimoMonto=localStorage.getItem('mt-monto-'+window._modalEmpId);}catch(e){}
      if(ultimoMonto&&!isNaN(parseFloat(ultimoMonto))){
        inp.value=parseFloat(ultimoMonto).toFixed(2);
      } else {
        inp.value=sueldo>0?(sueldo*0.5).toFixed(2):'';
      }
      inp.focus();
      inp.select();
    }
  }
}
function confirmarMedioTiempo(){
  var inp=document.getElementById('mt-monto');
  var monto=parseFloat(inp?inp.value:0)||0;
  // Guardar el monto para recordarlo la próxima vez
  try{localStorage.setItem('mt-monto-'+window._modalEmpId,monto);}catch(e){}
  var emp=personal.find(function(p){return p.id===window._modalEmpId;});
  var sueldo=emp?(emp.sueldoDia||emp.sueldo||0):0;
  // Calcular porcentaje equivalente para el historial
  var pct=sueldo>0?Math.round((monto/sueldo)*100):50;
  guardarAsisUnicaMonto(window._modalEmpId,window._modalEmpNombre,window._modalFecha,monto,pct);
  cerrarModalAsis();
}
function guardarAsisUnicaMonto(personalId,nombre,fecha,monto,pct){
  var existentes=asistencias.filter(function(a){return a.personalId===personalId&&a.fecha===fecha;});
  var promises=existentes.map(function(a){return db.ref('asistencias/'+a.id).remove();});
  var data={personalId:personalId,nombre:nombre,estado:'medio tiempo',fecha:fecha,hora:nowTime(),timestamp:new Date().toISOString(),montoFijo:monto,porcentaje:pct};
  Promise.all(promises).then(function(){
    db.ref('asistencias').push(data).then(function(){showToast(nombre+' — Medio tiempo S/ '+monto.toFixed(2));});
  });
}

function confirmarAsis(estado){

function guardarAdelanto(personalId,nombre){
  var tipo=document.getElementById('ad-tipo').value;
  var fecha=document.getElementById('ad-fecha').value||today();
  var nota=document.getElementById('ad-nota').value;
  var monto=0,descripcion='';
  if(tipo==='efectivo'){
    monto=parseFloat(document.getElementById('ad-monto').value)||0;
    descripcion='Adelanto efectivo';
  } else {
    var sel=document.getElementById('ad-prod');
    var opt=sel.options[sel.selectedIndex];
    var cant=parseFloat(document.getElementById('ad-cant').value)||1;
    monto=cant*(parseFloat(opt.dataset.precio)||0);
    descripcion=cant+' x '+opt.dataset.nombre;
  }
  if(monto<=0){showToast('Monto invalido',true);return;}
  db.ref('adelantos').push({personalId:personalId,nombre:nombre,tipo:tipo,monto:monto,descripcion:descripcion,fecha:fecha,hora:nowTime(),nota:nota,liquidado:false,timestamp:new Date().toISOString()})
    .then(function(){showToast('Adelanto registrado - '+fmt(monto));});
}

function liquidarAdelantos(personalId,nombre,mes){
  if(!confirm('Marcar todos los adelantos de '+mes+' como pagados?'))return;
  var adEmp=adelantos.filter(function(a){return a.personalId===personalId&&a.fecha.slice(0,7)===mes&&!a.liquidado});
  var promesas=adEmp.map(function(a){return db.ref('adelantos/'+a.id).update({liquidado:true});});
  Promise.all(promesas).then(function(){showToast('Adelantos marcados como pagados');});
}

function renderGastos(){
  var gastosHoy=gastos.filter(function(g){return g.fecha===today();});

  var totalGeneral=gastos.reduce(function(a,g){return a+g.monto;},0);

  html+='<div style="display:flex;gap:10px">';
  html+='<button id="gpago-ef" onclick="selGastoPago(\'efectivo\')" style="flex:1;padding:10px;border-radius:8px;border:2px solid #8b0000;background:#8b0000;color:#fff;cursor:pointer;font-size:14px">Efectivo</button>';
  html+='<button id="gpago-yp" onclick="selGastoPago(\'yape\')" style="flex:1;padding:10px;border-radius:8px;border:2px solid #ddd;background:#fff;color:#555;cursor:pointer;font-size:14px">Yape</button>';
  html+='</div></div>';
  html+='<button onclick="guardarGasto()" style="background:#8b0000;color:#fff;border:none;border-radius:8px;padding:14px;font-size:16px;width:100%;cursor:pointer;margin-top:4px">Registrar gasto</button>';
  html+='</div>';

  // Filtro de periodo
  var gPeriodo=window._gPeriodo||'hoy';
  var now=new Date();
  var gastosVista=gastos.filter(function(g){
    if(gPeriodo==='hoy') return g.fecha===today();
    if(gPeriodo==='semana'){
      var d=new Date(g.fecha+'T00:00:00');
      var diff=(now-d)/(1000*60*60*24);
      return diff>=0&&diff<7;
    }
    if(gPeriodo==='mes') return g.fecha.slice(0,7)===today().slice(0,7);
    return true;
  });
  var totalVista=gastosVista.reduce(function(a,g){return a+g.monto;},0);

  html+='<div class="card">';
  html+='<div style="display:flex;gap:6px;margin-bottom:12px">';
  ['hoy','semana','mes','todo'].forEach(function(p){
    var lbl={hoy:'Hoy',semana:'Semana',mes:'Mes',todo:'Todo'}[p];
    var active=gPeriodo===p;
    html+='<button onclick="setGastoPeriodo(\''+p+'\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid '+(active?'#8b0000':'#ddd')+';background:'+(active?'#8b0000':'#fff')+';color:'+(active?'#fff':'#555')+';cursor:pointer;font-size:13px">'+lbl+'</button>';
  });
  html+='</div>';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  html+='<div class="sl" style="margin:0">'+gastosVista.length+' gastos</div>';
  html+='<div style="font-size:16px;color:#A32D2D">- '+fmt(totalVista)+'</div></div>';
  if(gastosVista.length===0){html+='<div class="empty">Sin gastos en este periodo</div>';}
  else{
    gastosVista.slice().reverse().forEach(function(g){
      html+='<div class="row"><div>';
      html+='<div class="rn">'+g.descripcion+'</div>';
      html+='<div class="rm">'+fmtDate(g.fecha)+' '+g.hora+(g.pago==='yape'?' · <span style="color:#7b2fff">Yape</span>':' · Efectivo')+(g.registradoPor?' · '+g.registradoPor:'')+'</div>';
      html+='</div>';
      html+='<div style="display:flex;align-items:center;gap:6px">';
      html+='<div class="ra" style="color:#A32D2D">-'+fmt(g.monto)+'</div>';
      html+='<button class="btnd" onclick="eliminarGasto(\''+g.id+'\')">x</button>';
      html+='</div></div>';
    });
  }
  html+='</div>';
  html+='<button onclick="exportarGastosCSV()" style="width:100%;background:#fff;border:1px solid #555;color:#555;border-radius:8px;padding:10px;cursor:pointer;font-size:14px;margin-bottom:8px">Exportar gastos CSV</button>';

  document.getElementById('gastos').innerHTML=html;
  window._gastoPago='efectivo';
}

function toggleExtras(btn){
  var card=btn.parentElement;
  var prodExtras=card.querySelectorAll('.prod-extra');
  var gastoExtras=card.querySelectorAll('.gasto-extra');
  var ventaExtras=card.querySelectorAll('.venta-extra');
  var expanded=btn.getAttribute('data-expanded')==='1';
  prodExtras.forEach(function(el){el.style.display=expanded?'none':'flex';});
  gastoExtras.forEach(function(el){el.style.display=expanded?'none':'flex';});
  ventaExtras.forEach(function(el){el.style.display=expanded?'none':'flex';});
  btn.setAttribute('data-expanded',expanded?'0':'1');
  var match=btn.textContent.match(/\((\d+)\)/);
  var label=match?match[1]:'';
  btn.textContent=(expanded?'Ver todos (':'Ocultar (')+label+') '+(expanded?'▼':'▲');
}

  var totalG=gastosHoyEx.reduce(function(a,g){return a+g.monto;},0);
  var win=window.open('','_blank');

  win.document.write('<h2>Ventas</h2><table><tr><th>Hora</th><th>Producto</th><th>Cant</th><th>Precio</th><th>Total</th><th>Pago</th></tr>'+rows+'</table>');
  win.document.write('<div class="total">Total ventas: '+fmt(totalV)+'</div>');
  win.document.write('<h2>Gastos</h2><table><tr><th>Hora</th><th>Descripcion</th><th></th><th></th><th>Monto</th><th>Pago</th></tr>'+grow+'</table>');
  win.document.write('<div class="total" style="color:#A32D2D">Total gastos: '+fmt(totalG)+'</div>');
  win.document.write('<div class="saldo">Saldo en caja: '+fmt(totalV-totalG)+'</div>');
  win.document.write('
</body></html>');

  win.print();

function exportarGastosCSV(){
  var rows=[['Fecha','Hora','Descripcion','Monto','Pago','Registrado por']];
  gastos.forEach(function(g){rows.push([g.fecha,g.hora,g.descripcion,g.monto,g.pago,g.registradoPor||'']);});
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='gastos-mary-'+today()+'.csv';a.click();
  URL.revokeObjectURL(url);
}

function exportarVentasCSV(){
  var rows=[['Fecha','Hora','Producto','Cantidad','Precio','Total','Pago','Turno']];
  ventas.forEach(function(v){rows.push([v.fecha,v.hora,v.producto,v.cantidad,v.precioUnit,v.total,v.pago,v.turno]);});
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='ventas-mary-'+today()+'.csv';a.click();
  URL.revokeObjectURL(url);
}

  window._gastoPago=tipo;

  if(tipo==='efectivo'){

function guardarGasto(){
  var desc=document.getElementById('gasto-desc').value.trim();
  var monto=parseFloat(document.getElementById('gasto-monto').value)||0;
  if(!desc){showToast('Escribe que se va a comprar');return;}
  if(monto<=0){showToast('Ingresa un monto valido');return;}
  var pago=window._gastoPago||'efectivo';
  db.ref('gastos').push({
    descripcion:desc,
    monto:monto,
    pago:pago,
    fecha:today(),
    hora:nowTime(),
    registradoPor:currentUser?currentUser.nombre:'',
    timestamp:new Date().toISOString()
  }).then(function(){
    showToast('Gasto registrado: '+fmt(monto));
    document.getElementById('gasto-desc').value='';
    document.getElementById('gasto-monto').value='';
  });
}

function guardarReceta(){
  var nom=document.getElementById('rec-nom').value.trim();
  var cat=document.getElementById('rec-cat').value;
  var rinde=document.getElementById('rec-rinde').value.trim();
  var ingr=document.getElementById('rec-ingr').value.trim();
  var pasos=document.getElementById('rec-pasos').value.trim();
  var notas=document.getElementById('rec-notas').value.trim();
  if(!nom){showToast('El nombre es obligatorio',true);return;}
  if(!ingr){showToast('Agrega al menos los ingredientes',true);return;}
  var visiblePara=[];
  document.querySelectorAll('.rec-vis-emp:checked').forEach(function(cb){visiblePara.push(cb.value);});
  var data={nombre:nom,categoria:cat,rinde:rinde,ingredientes:ingr,pasos:pasos,notas:notas,visiblePara:visiblePara,timestamp:Date.now()};
  if(window._editandoReceta){
    db.ref('recetas/'+window._editandoReceta).update(data).then(function(){
      window._editandoReceta=null;showToast('Receta actualizada');
    });
  } else {
    db.ref('recetas').push(data).then(function(){showToast('Receta guardada');});
  }
}

function editarReceta(id){
  window._editandoReceta=id;
  renderRecetas();
  window.scrollTo({top:0,behavior:'smooth'});
}

function cancelarEdicionReceta(){
  window._editandoReceta=null;
  renderRecetas();
}

function eliminarReceta(id){
  if(!confirm('¿Eliminar esta receta? Esta acción no se puede deshacer.'))return;
  db.ref('recetas/'+id).remove().then(function(){showToast('Receta eliminada');});
}

function renderProductos(){
  var html='<div class="card"><div class="sl">Agregar producto</div>';
  html+='<div class="g2"><div class="field"><label>Nombre</label><input type="text" id="pp-nom" placeholder="Ej: Arroz con leche"></div>';
  html+='<div class="field"><label>Precio (S/)</label><input type="number" id="pp-precio" placeholder="0.00" step="0.5"></div></div>';
  html+='<div class="field"><label>Turno</label><select id="pp-turno"><option value="desayuno">🌅 Desayuno</option><option value="almuerzo" selected>☀️ Almuerzo</option><option value="cena">🌙 Cena</option><option value="otros">🍴 Otros</option><option value="bebidas">🥤 Bebidas</option></select></div>';
  html+='<button class="btn" onclick="agregarProducto()">Agregar producto</button></div>';
  html+='<div class="card"><div class="sl">Lista de productos ('+productos.length+')</div>';
  if(productos.length===0){html+='<div class="empty">Sin productos</div>';}
  else{productos.forEach(function(p){
    html+='<div class="prod-row"><div><div class="rn">'+p.nombre+'<span class="badge '+turnoClass(p.turno)+'">'+turnoLabel(p.turno)+'</span></div></div>';
    html+='<div style="display:flex;align-items:center;gap:8px"><input class="inp-sm" type="number" value="'+p.precio+'" step="0.5" onchange="editarPrecio(\''+p.id+'\',this.value)">';
    html+='<button class="btnd" onclick="eliminarProducto(\''+p.id+'\')">x</button></div></div>';
  });}
  html+='</div>';
  document.getElementById('productos').innerHTML=html;
}
function agregarProducto(){
  var nom=document.getElementById('pp-nom').value.trim();
  var precio=parseFloat(document.getElementById('pp-precio').value)||0;
  var turno=document.getElementById('pp-turno').value;
  if(!nom||precio<=0){showToast('Completa nombre y precio',true);return;}
  db.ref('productos').push({nombre:nom,precio:precio,turno:turno}).then(function(){showToast('Producto agregado');});
}
function eliminarProducto(id){
  if(!confirm('Eliminar?'))return;
  db.ref('productos/'+id).remove().then(function(){showToast('Eliminado');});
}
function editarPrecio(id,val){
  var precio=parseFloat(val);if(!precio||precio<=0)return;
  db.ref('productos/'+id).update({precio:precio}).then(function(){showToast('Precio actualizado');});
}
</script>

<script>
// ── Service Worker + PWA Auto-Update ──
(function() {
  if (!('serviceWorker' in navigator)) return;

  let newWorker = null;

  function showUpdateBanner() {
    const banner = document.getElementById('pwa-update-banner');
    if (banner) banner.classList.add('visible');
  }

  window.applyPwaUpdate = function() {
    if (newWorker) {
      newWorker.postMessage({ type: 'SKIP_WAITING' });
    } else {
      window.location.reload();
    }
  };

  window.dismissPwaBanner = function() {
    const banner = document.getElementById('pwa-update-banner');
    if (banner) banner.classList.remove('visible');
  };

  navigator.serviceWorker.register('./sw.js').then(function(reg) {
    console.log('[App] Service Worker registrado:', reg.scope);

    // Si ya hay un SW esperando al abrir la app → mostrar banner
    if (reg.waiting) {
      newWorker = reg.waiting;
      showUpdateBanner();
    }

    // Cuando se instala un SW nuevo mientras la app está abierta
    reg.addEventListener('updatefound', function() {
      const installing = reg.installing;
      if (!installing) return;

      installing.addEventListener('statechange', function() {
        if (installing.state === 'installed' && navigator.serviceWorker.controller) {
          // Hay contenido nuevo esperando
          newWorker = installing;
          showUpdateBanner();
        }
      });
    });

    // Cuando el SW nuevo toma el control → recargar para cargar la versión nueva
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      window.location.reload();
    });

    // Verificar actualizaciones cada 30 minutos
    setInterval(function() {
      reg.update().catch(function() {});
    }, 30 * 60 * 1000);

  }).catch(function(err) {
    console.warn('[App] Service Worker no pudo registrarse:', err);
  });
})();
</script>
