<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mary — Registro de Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', sans-serif; background: #fdf8f0; color: #1a1a1a; min-height: 100vh; }
#loader { position: fixed; inset: 0; background: #fdf8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 14px; }
.loader-logo { font-family: 'Playfair Display', serif; font-size: 38px; color: #8b0000; letter-spacing: 5px; }
.loader-sub { font-size: 11px; letter-spacing: 4px; color: #bbb; text-transform: uppercase; }
.loader-dot { display: flex; gap: 7px; margin-top: 4px; }
.loader-dot span { width: 7px; height: 7px; border-radius: 50%; background: #c8a96e; animation: bounce 1s infinite; }
.loader-dot span:nth-child(2) { animation-delay: 0.15s; }
.loader-dot span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-9px)} }
#app { display: none; max-width: 600px; margin: 0 auto; padding: 0 0 50px; }
.header { text-align: center; padding: 24px 0 8px; }
.logo { font-family: 'Playfair Display', serif; font-size: 34px; color: #8b0000; letter-spacing: 5px; }
.sub { font-size: 10px; letter-spacing: 4px; color: #aaa; text-transform: uppercase; margin-top: 3px; }
.divider { width: 50px; height: 1.5px; background: #c8a96e; margin: 10px auto; }
.nav { display: flex; border-bottom: 1px solid #ede4d4; margin: 0 1rem; overflow-x: auto; }
.nb { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 16px; font-size: 13px; cursor: pointer; color: #aaa; margin-bottom: -1px; font-family: 'Source Sans 3', sans-serif; white-space: nowrap; }
.nb.on { color: #8b0000; border-bottom-color: #8b0000; font-weight: 600; }
.card { background: #fff; border: 1px solid #ede4d4; border-radius: 12px; padding: 18px; margin: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.sl { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: #8b0000; margin-bottom: 14px; font-weight: 600; }
.metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin: 1rem; }
.met { background: #fff; border: 1px solid #ede4d4; border-radius: 10px; padding: 12px 8px; text-align: center; }
.ml { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
.mv { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-top: 3px; }
.mv.g { color: #0F6E56; }
.mv.sm { font-size: 13px; margin-top: 5px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select { width: 100%; border: 1px solid #e0d5c5; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: 'Source Sans 3', sans-serif; color: #1a1a1a; background: #fff; }
.field input:focus, .field select:focus { outline: none; border-color: #8b0000; }
.total-field { color: #0F6E56 !important; font-weight: 600 !important; background: #f0faf5 !important; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.btn { background: #8b0000; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 14px; cursor: pointer; width: 100%; font-family: 'Source Sans 3', sans-serif; font-weight: 600; margin-top: 4px; }
.btn:hover { background: #6b0000; }
.btnd { background: none; border: none; color: #cc3333; font-size: 13px; cursor: pointer; padding: 4px 7px; border-radius: 4px; }
.fb { background: none; border: 1px solid #e0d5c5; border-radius: 20px; padding: 5px 13px; font-size: 11px; cursor: pointer; color: #888; font-family: 'Source Sans 3', sans-serif; }
.fb.on { background: #8b0000; color: #fff; border-color: #8b0000; }
.row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid #f0e8d8; }
.row:last-child { border-bottom: none; }
.rn { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.rm { font-size: 12px; color: #bbb; margin-top: 2px; }
.ra { font-size: 15px; font-weight: 600; color: #0F6E56; }
.badge { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
.bd { background: #EAF3DE; color: #3B6D11; }
.ba { background: #E6F1FB; color: #185FA5; }
.bc { background: #FAEEDA; color: #854F0B; }
.bo { background: #F1EFE8; color: #5F5E5A; }
.empty { text-align: center; padding: 2rem; color: #ccc; font-size: 14px; }
.bar-row { margin-bottom: 12px; }
.bar-label { font-size: 12px; color: #aaa; margin-bottom: 4px; display: flex; justify-content: space-between; }
.bar-bg { height: 16px; background: #f5ede0; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: #8b0000; border-radius: 4px; }
.prod-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 0.5px solid #f0e8d8; }
.prod-row:last-child { border-bottom: none; }
.inp-sm { width: 90px; border: 1px solid #e0d5c5; border-radius: 6px; padding: 6px 8px; font-size: 13px; font-family: 'Source Sans 3', sans-serif; color: #1a1a1a; text-align: center; }
.frow { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f4a1f; color: #fff; padding: 10px 22px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }
.error-box { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px; padding: 14px; margin: 1rem; font-size: 13px; color: #8b0000; }
@media (max-width: 420px) { .metrics { grid-template-columns: repeat(2,1fr); } .g3 { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">Mary</div>
  <div class="loader-sub">Conectando...</div>
  <div class="loader-dot"><span></span><span></span><span></span></div>
</div>

<div id="app">
  <div class="header">
    <div class="logo">Mary</div>
    <div class="sub">Registro de Ventas</div>
    <div class="divider"></div>
  </div>
  <nav class="nav">
    <button class="nb on" onclick="showTab('dashboard')">Resumen</button>
    <button class="nb" onclick="showTab('nueva')">+ Nueva venta</button>
    <button class="nb" onclick="showTab('historial')">Historial</button>
    <button class="nb" onclick="showTab('productos')">Productos</button>
  </nav>
  <div id="dashboard"></div>
  <div id="nueva" style="display:none"></div>
  <div id="historial" style="display:none"></div>
  <div id="productos" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyCQIboNV2qf6Wcc1DIaI7WN4T6rUh1UyJg",
  authDomain: "mary-restaurante.firebaseapp.com",
  databaseURL: "https://mary-restaurante-default-rtdb.firebaseio.com",
  projectId: "mary-restaurante",
  storageBucket: "mary-restaurante.firebasestorage.app",
  messagingSenderId: "499224458217",
  appId: "1:499224458217:web:80c08c756631359e575178"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var ventas = [];
var productos = [];
var activeTab = 'dashboard';
var filterTurno = 'todos';
var filterDate = '';

var defaultProductos = [
  { nombre: 'Pollo a la brasa', precio: 18, turno: 'almuerzo' },
  { nombre: 'Desayuno completo', precio: 8, turno: 'desayuno' },
  { nombre: 'Menu almuerzo', precio: 10, turno: 'almuerzo' },
  { nombre: 'Menu cena', precio: 10, turno: 'cena' },
  { nombre: 'Porcion de pollo', precio: 12, turno: 'almuerzo' }
];

function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { var p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function fmt(n) { return 'S/ '+parseFloat(n).toFixed(2); }
function turnoClass(t) { return t==='desayuno'?'bd':t==='almuerzo'?'ba':t==='cena'?'bc':'bo'; }
function turnoLabel(t) { return t.charAt(0).toUpperCase()+t.slice(1); }

function showToast(msg, error) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = error ? '#7a1f1f' : '#1f4a1f';
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// Escuchar productos
db.ref('productos').on('value', function(snap) {
  productos = [];
  snap.forEach(function(child) {
    productos.push(Object.assign({ id: child.key }, child.val()));
  });
  productos.sort(function(a,b){ return a.nombre.localeCompare(b.nombre); });
  if (productos.length === 0) {
    defaultProductos.forEach(function(p) { db.ref('productos').push(p); });
  }
  render();
}, function(err) {
  console.error('Error productos:', err);
});

// Escuchar ventas
db.ref('ventas').on('value', function(snap) {
  ventas = [];
  snap.forEach(function(child) {
    ventas.push(Object.assign({ id: child.key }, child.val()));
  });
  ventas.sort(function(a,b){ return (b.timestamp||'').localeCompare(a.timestamp||''); });
  render();
  document.getElementById('loader').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}, function(err) {
  console.error('Error ventas:', err);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('dashboard').innerHTML = '<div class="error-box">Error al conectar con la base de datos. Verifica las reglas de Firebase.</div>';
});

// Timeout por si Firebase no responde
setTimeout(function() {
  if (document.getElementById('loader').style.display !== 'none') {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }
}, 5000);

function showTab(name) {
  activeTab = name;
  document.querySelectorAll('.nb').forEach(function(b, i) {
    b.classList.toggle('on', ['dashboard','nueva','historial','productos'][i] === name);
  });
  ['dashboard','nueva','historial','productos'].forEach(function(t) {
    document.getElementById(t).style.display = t===name ? 'block' : 'none';
  });
  render();
}

function render() {
  if (activeTab==='dashboard') renderDashboard();
  else if (activeTab==='nueva') renderNueva();
  else if (activeTab==='historial') renderHistorial();
  else if (activeTab==='productos') renderProductos();
}

function renderDashboard() {
  var hoy = ventas.filter(function(v){ return v.fecha === today(); });
  var total = hoy.reduce(function(a,v){ return a+v.total; }, 0);
  var byTurno = function(t){ return hoy.filter(function(v){ return v.turno===t; }).reduce(function(a,v){ return a+v.total; }, 0); };
  var d=byTurno('desayuno'), al=byTurno('almuerzo'), c=byTurno('cena');
  var maxBar = Math.max(d,al,c,1);
  var topProds = {};
  hoy.forEach(function(v){ topProds[v.producto] = (topProds[v.producto]||0)+v.cantidad; });
  var top = Object.entries(topProds).sort(function(a,b){ return b[1]-a[1]; }).slice(0,4);

  var html = '<div class="metrics">';
  html += '<div class="met"><div class="ml">Total hoy</div><div class="mv g">'+fmt(total)+'</div></div>';
  html += '<div class="met"><div class="ml">Ventas</div><div class="mv">'+hoy.length+'</div></div>';
  html += '<div class="met"><div class="ml">Promedio</div><div class="mv">'+(hoy.length?fmt(total/hoy.length):'S/ 0')+'</div></div>';
  html += '<div class="met"><div class="ml">Fecha</div><div class="mv sm">'+fmtDate(today())+'</div></div>';
  html += '</div>';

  html += '<div class="card"><div class="sl">Ventas por turno hoy</div>';
  [['desayuno',d],['almuerzo',al],['cena',c]].forEach(function(item){
    html += '<div class="bar-row"><div class="bar-label"><span>'+turnoLabel(item[0])+'</span><span>'+fmt(item[1])+'</span></div>';
    html += '<div class="bar-bg"><div class="bar-fill" style="width:'+((item[1]/maxBar*100).toFixed(0))+'%"></div></div></div>';
  });
  html += '</div>';

  if (top.length) {
    html += '<div class="card"><div class="sl">Mas vendido hoy</div>';
    top.forEach(function(item){ html += '<div class="row"><div class="rn">'+item[0]+'</div><div class="ra">'+item[1]+' unid.</div></div>'; });
    html += '</div>';
  }

  html += '<div class="card"><div class="sl">Ultimas ventas</div>';
  if (hoy.length === 0) {
    html += '<div class="empty">Sin ventas registradas hoy</div>';
  } else {
    hoy.slice(0,8).forEach(function(v){
      html += '<div class="row"><div><div class="rn">'+v.producto+'<span class="badge '+turnoClass(v.turno)+'">'+turnoLabel(v.turno)+'</span></div>';
      html += '<div class="rm">'+v.cantidad+' x '+fmt(v.precioUnit)+' - '+v.hora+(v.obs?' - '+v.obs:'')+'</div></div>';
      html += '<div style="display:flex;align-items:center;gap:6px"><div class="ra">'+fmt(v.total)+'</div>';
      html += '<button class="btnd" onclick="eliminarVenta(\''+v.id+'\')">x</button></div></div>';
    });
  }
  html += '</div>';
  document.getElementById('dashboard').innerHTML = html;
}

function renderNueva() {
  var opts = productos.map(function(p){
    return '<option value="'+p.id+'" data-precio="'+p.precio+'" data-turno="'+p.turno+'">'+p.nombre+' - '+fmt(p.precio)+'</option>';
  }).join('');
  var html = '<div class="card"><div class="sl">Registrar venta</div>';
  html += '<div class="field"><label>Producto</label><select id="np-prod" onchange="actualizarPrecio()">'+opts+'</select></div>';
  html += '<div class="g3">';
  html += '<div class="field"><label>Cantidad</label><input type="number" id="np-cant" value="1" min="1" oninput="calcTotal()"></div>';
  html += '<div class="field"><label>Precio (S/)</label><input type="number" id="np-precio" step="0.5" oninput="calcTotal()"></div>';
  html += '<div class="field"><label>Total</label><input type="text" id="np-total" readonly class="total-field"></div>';
  html += '</div><div class="g2">';
  html += '<div class="field"><label>Turno</label><select id="np-turno"><option value="desayuno">Desayuno</option><option value="almuerzo" selected>Almuerzo</option><option value="cena">Cena</option><option value="otro">Otro</option></select></div>';
  html += '<div class="field"><label>Fecha</label><input type="date" id="np-fecha" value="'+today()+'"></div>';
  html += '</div><div class="field"><label>Observacion (opcional)</label><input type="text" id="np-obs" placeholder="Ej: para llevar..."></div>';
  html += '<button class="btn" onclick="guardarVenta()">Registrar venta</button></div>';
  document.getElementById('nueva').innerHTML = html;
  actualizarPrecio();
}

function actualizarPrecio() {
  var sel = document.getElementById('np-prod');
  if (!sel) return;
  var opt = sel.options[sel.selectedIndex];
  document.getElementById('np-precio').value = opt.dataset.precio;
  var turno = opt.dataset.turno;
  if (['desayuno','almuerzo','cena'].indexOf(turno) >= 0) document.getElementById('np-turno').value = turno;
  calcTotal();
}

function calcTotal() {
  var cant = parseFloat(document.getElementById('np-cant').value)||0;
  var precio = parseFloat(document.getElementById('np-precio').value)||0;
  var el = document.getElementById('np-total');
  if (el) el.value = fmt(cant*precio);
}

function guardarVenta() {
  var sel = document.getElementById('np-prod');
  var prod = null;
  for (var i=0; i<productos.length; i++) { if (productos[i].id===sel.value) { prod=productos[i]; break; } }
  var cant = parseFloat(document.getElementById('np-cant').value)||1;
  var precio = parseFloat(document.getElementById('np-precio').value)||0;
  var turno = document.getElementById('np-turno').value;
  var fecha = document.getElementById('np-fecha').value||today();
  var obs = document.getElementById('np-obs').value;
  if (!prod||cant<=0||precio<=0) { showToast('Completa todos los campos', true); return; }
  var now = new Date();
  var hora = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  db.ref('ventas').push({
    producto: prod.nombre, prodId: prod.id,
    cantidad: cant, precioUnit: precio, total: cant*precio,
    turno: turno, fecha: fecha, hora: hora, obs: obs,
    timestamp: now.toISOString()
  }).then(function(){
    showToast('Venta registrada - '+fmt(cant*precio));
    showTab('dashboard');
  }).catch(function(e){ showToast('Error al guardar', true); console.error(e); });
}

function eliminarVenta(id) {
  if (!confirm('Eliminar esta venta?')) return;
  db.ref('ventas/'+id).remove()
    .then(function(){ showToast('Venta eliminada'); })
    .catch(function(){ showToast('Error', true); });
}

function renderHistorial() {
  var filtradas = ventas.filter(function(v){
    if (filterTurno!=='todos' && v.turno!==filterTurno) return false;
    if (filterDate && v.fecha!==filterDate) return false;
    return true;
  });
  var totalFiltrado = filtradas.reduce(function(a,v){ return a+v.total; }, 0);

  var html = '<div class="card"><div class="sl">Filtros</div><div class="frow">';
  ['todos','desayuno','almuerzo','cena'].forEach(function(t){
    html += '<button class="fb '+(filterTurno===t?'on':'')+'" onclick="setFilter(\''+t+'\')">'+(t==='todos'?'Todos':turnoLabel(t))+'</button>';
  });
  html += '</div><div class="field"><label>Por fecha</label><input type="date" value="'+filterDate+'" onchange="setFilterDate(this.value)" style="max-width:200px"></div></div>';

  html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">';
  html += '<div class="sl" style="margin:0">'+filtradas.length+' ventas</div>';
  html += '<div style="font-size:15px;font-weight:600;color:#0F6E56">'+fmt(totalFiltrado)+'</div></div>';

  if (filtradas.length===0) {
    html += '<div class="empty">Sin ventas en este periodo</div>';
  } else {
    filtradas.forEach(function(v){
      html += '<div class="row"><div><div class="rn">'+v.producto+'<span class="badge '+turnoClass(v.turno)+'">'+turnoLabel(v.turno)+'</span></div>';
      html += '<div class="rm">'+fmtDate(v.fecha)+' '+v.hora+' - '+v.cantidad+' x '+fmt(v.precioUnit)+(v.obs?' - '+v.obs:'')+'</div></div>';
      html += '<div style="display:flex;align-items:center;gap:6px"><div class="ra">'+fmt(v.total)+'</div>';
      html += '<button class="btnd" onclick="eliminarVenta(\''+v.id+'\')">x</button></div></div>';
    });
  }
  html += '</div>';
  document.getElementById('historial').innerHTML = html;
}

function setFilter(t) { filterTurno=t; render(); }
function setFilterDate(d) { filterDate=d; render(); }

function renderProductos() {
  var html = '<div class="card"><div class="sl">Agregar producto</div><div class="g2">';
  html += '<div class="field"><label>Nombre</label><input type="text" id="pp-nom" placeholder="Ej: Arroz con leche"></div>';
  html += '<div class="field"><label>Precio (S/)</label><input type="number" id="pp-precio" placeholder="0.00" step="0.5"></div>';
  html += '</div><div class="field"><label>Turno</label><select id="pp-turno"><option value="desayuno">Desayuno</option><option value="almuerzo" selected>Almuerzo</option><option value="cena">Cena</option><option value="otro">Otro</option></select></div>';
  html += '<button class="btn" onclick="agregarProducto()">Agregar producto</button></div>';

  html += '<div class="card"><div class="sl">Lista de productos ('+productos.length+')</div>';
  if (productos.length===0) {
    html += '<div class="empty">Sin productos</div>';
  } else {
    productos.forEach(function(p){
      html += '<div class="prod-row"><div><div class="rn">'+p.nombre+'<span class="badge '+turnoClass(p.turno)+'">'+turnoLabel(p.turno)+'</span></div></div>';
      html += '<div style="display:flex;align-items:center;gap:8px"><input class="inp-sm" type="number" value="'+p.precio+'" step="0.5" onchange="editarPrecio(\''+p.id+'\',this.value)">';
      html += '<button class="btnd" onclick="eliminarProducto(\''+p.id+'\')">x</button></div></div>';
    });
  }
  html += '</div>';
  document.getElementById('productos').innerHTML = html;
}

function agregarProducto() {
  var nom = document.getElementById('pp-nom').value.trim();
  var precio = parseFloat(document.getElementById('pp-precio').value)||0;
  var turno = document.getElementById('pp-turno').value;
  if (!nom||precio<=0) { showToast('Completa nombre y precio', true); return; }
  db.ref('productos').push({ nombre:nom, precio:precio, turno:turno })
    .then(function(){ showToast('Producto agregado'); })
    .catch(function(){ showToast('Error al guardar', true); });
}

function eliminarProducto(id) {
  if (!confirm('Eliminar este producto?')) return;
  db.ref('productos/'+id).remove()
    .then(function(){ showToast('Producto eliminado'); })
    .catch(function(){ showToast('Error', true); });
}

function editarPrecio(id, val) {
  var precio = parseFloat(val);
  if (!precio||precio<=0) return;
  db.ref('productos/'+id).update({ precio:precio })
    .then(function(){ showToast('Precio actualizado'); })
    .catch(function(){});
}
</script>
</body>
</html>
