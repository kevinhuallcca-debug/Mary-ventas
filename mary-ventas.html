function renderSubLiquidacion(emp,mes){
  // Buscar ultimo pago registrado como "pagado hasta"
  var pagosEmp=pagos.filter(function(p){return p.personalId===emp.id;});
  pagosEmp.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  var ultimoPago=pagosEmp.length?pagosEmp[0]:null;
  var desdeFecha=ultimoPago?ultimoPago.fecha:null;

  // Asistencias desde ultimo pago (o todo si no hay pago)
  var asisTotal=asistencias.filter(function(a){
    return a.personalId===emp.id&&(!desdeFecha||a.fecha>desdeFecha);
  });
  var diasT=[];asisTotal.forEach(function(a){if((a.estado==='asistio'||a.estado==='medio tiempo'||a.estado==='descanso pagado')&&diasT.indexOf(a.fecha)<0)diasT.push(a.fecha);});
  var diasF=[];asisTotal.forEach(function(a){if(a.estado==='no asistio'&&diasF.indexOf(a.fecha)<0)diasF.push(a.fecha);});
  var diasMed=asisTotal.filter(function(a){return a.estado==='medio tiempo';}).length;

  // Adelantos pendientes desde ultimo pago
  var adEmp=adelantos.filter(function(a){return a.personalId===emp.id&&!a.liquidado&&(!desdeFecha||a.fecha>desdeFecha);});
  var totalAd=adEmp.reduce(function(a,x){return a+x.monto;},0);
  var sueldoDia=emp.sueldoDia||emp.sueldo||0;

  // Calcular ganado por dias (cada dia puede tener sueldo diferente si hubo aumento)
  // Usamos historial de sueldos si existe
  var histSueldos=(emp.historialSueldos||[]).slice().sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
  function getSueldoParaDia(fecha){
    var s=sueldoDia;
    for(var i=histSueldos.length-1;i>=0;i--){
      if(histSueldos[i].fecha<=fecha){s=histSueldos[i].monto;break;}
    }
    return s;
  }
  var ganado=0;
  diasT.forEach(function(f){
    var s=getSueldoParaDia(f);
    // medio tiempo = monto fijo guardado, o porcentaje si es registro antiguo
    var esMedio=asisTotal.some(function(a){return a.fecha===f&&a.estado==='medio tiempo';});
    if(esMedio){var rmT=asisTotal.find(function(a){return a.fecha===f&&a.estado==='medio tiempo';});ganado+=(rmT&&rmT.montoFijo!=null)?rmT.montoFijo:s*((rmT&&rmT.porcentaje||50)/100);}else{ganado+=s;}
  });
  var saldo=ganado-totalAd;

  var html='<div class="card"><div class="sl">Liquidacion</div>';

  // Boton configurar sueldo por dia
  html+='<div style="background:#f9f5ef;border-radius:10px;padding:12px;margin-bottom:12px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  html+='<span style="font-size:13px;font-weight:600;color:#555">Sueldo por día</span>';
  html+='<span style="font-size:20px;font-weight:700;color:#0F6E56">'+fmt(sueldoDia)+'/día</span></div>';
  html+='<div style="display:flex;gap:8px">';
  html+='<input type="number" id="nuevo-sueldo-'+emp.id+'" placeholder="Nuevo monto" step="5" min="0" style="flex:1;border:1px solid #e0d5c5;border-radius:8px;padding:9px;font-size:14px;font-family:inherit">';
  html+='<button onclick="actualizarSueldoDia(\''+emp.id+'\')" style="background:#8b0000;color:#fff;border:none;border-radius:8px;padding:9px 14px;cursor:pointer;font-size:13px;white-space:nowrap">Actualizar</button></div>';
  if(histSueldos.length>0){
    html+='<div style="margin-top:8px;font-size:11px;color:#aaa">';
    var last=histSueldos[histSueldos.length-1];
    html+='Último cambio: '+fmtDate(last.fecha)+' → '+fmt(last.monto)+'/día</div>';
  }
  html+='</div>';

  // Info desde cuando se cuenta
  if(desdeFecha){
    html+='<div style="background:#f0faf5;border-radius:8px;padding:10px;margin-bottom:12px;font-size:13px;color:#0F6E56">';
    html+='Contando desde: <strong>'+fmtDate(desdeFecha)+'</strong> (último pago)</div>';
  } else {
    html+='<div style="background:#f9f5ef;border-radius:8px;padding:10px;margin-bottom:12px;font-size:13px;color:#888">';
    html+='Mostrando todos los dias (aún sin pago registrado)</div>';
  }

  html+='<div class="resumen-box">';
  html+='<div class="resumen-row"><span>Dias trabajados</span><span>'+diasT.length+' días · '+fmt(ganado)+'</span></div>';
  html+='<div class="resumen-row"><span>Medio tiempo</span><span style="color:#854F0B">'+diasMed+' días (½ sueldo)</span></div>';
  html+='<div class="resumen-row"><span>Faltas</span><span style="color:#A32D2D">'+diasF.length+' días</span></div>';
  html+='<div class="resumen-row"><span>Adelantos efectivo</span><span style="color:#185FA5">- '+fmt(adEmp.filter(function(a){return a.tipo==='efectivo';}).reduce(function(a,x){return a+x.monto;},0))+'</span></div>';
  html+='<div class="resumen-row"><span>Adelantos productos</span><span style="color:#993556">- '+fmt(adEmp.filter(function(a){return a.tipo==='producto';}).reduce(function(a,x){return a+x.monto;},0))+'</span></div>';
  html+='<div class="resumen-row total"><span>TOTAL GANADO</span><span style="color:#0F6E56">'+fmt(ganado)+'</span></div>';
  html+='<div class="resumen-row total"><span>SALDO A PAGAR</span><span style="color:'+(saldo<0?'#cc3333':'#0F6E56')+'">'+fmt(saldo)+'</span></div></div>';

  // Botón PAGADO HASTA HOY
  html+='<div style="margin-top:12px;background:#f9f5ef;border-radius:10px;padding:12px">';
  html+='<div style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px">Registrar pago</div>';
  html+='<div style="margin-bottom:8px"><label style="font-size:12px;color:#888;display:block;margin-bottom:4px">Pagado hasta que fecha</label>';
  html+='<input type="date" id="fecha-pago-'+emp.id+'" value="'+today()+'" style="width:100%;border:1px solid #e0d5c5;border-radius:8px;padding:10px;font-size:15px;font-family:inherit"></div>';
  html+='<button onclick="registrarPagoHasta(\''+emp.id+'\',\''+emp.nombre+'\',\'fecha-pago-'+emp.id+'\')" style="background:#8b0000;color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;width:100%;cursor:pointer">✓ Marcar como pagado</button>';
  html+='</div>';

  if(adEmp.length>0){

function guardarAsisUnica(personalId, nombre, estado, fecha, porcentaje){

  var promises=existentes.map(function(a){return db.ref('asistencias/'+a.id).remove();});
  var data={personalId:personalId,nombre:nombre,estado:estado,fecha:fecha,hora:nowTime(),timestamp:new Date().toISOString()};
  if(estado==='medio tiempo'){data.porcentaje=porcentaje||50;}
  Promise.all(promises).then(function(){
    db.ref('asistencias').push(data).then(function(){
      var label=estado==='medio tiempo'?estado+' ('+data.porcentaje+'%)':estado;
      showToast(nombre+' — '+label);

  });
}

function renderGastos(){
  var gastosHoy=gastos.filter(function(g){return g.fecha===today();});

  var totalGeneral=gastos.reduce(function(a,g){return a+g.monto;},0);

  html+='<div class="field"><label>Monto (S/)</label>';
  html+='<input type="number" id="gasto-monto" placeholder="0.00" min="0" step="0.01" style="width:100%;border:1px solid #e0d5c5;border-radius:8px;padding:12px 14px;font-size:16px;font-family:inherit"></div>';

  html+='<div style="display:flex;gap:10px">';
  html+='<button id="gpago-ef" onclick="selGastoPago(\'efectivo\')" style="flex:1;padding:10px;border-radius:8px;border:2px solid #8b0000;background:#8b0000;color:#fff;cursor:pointer;font-size:14px">Efectivo</button>';
  html+='<button id="gpago-yp" onclick="selGastoPago(\'yape\')" style="flex:1;padding:10px;border-radius:8px;border:2px solid #ddd;background:#fff;color:#555;cursor:pointer;font-size:14px">Yape</button>';
  html+='</div></div>';
  html+='<button onclick="guardarGasto()" style="background:#8b0000;color:#fff;border:none;border-radius:8px;padding:14px;font-size:16px;width:100%;cursor:pointer;margin-top:4px">Registrar gasto</button>';
  html+='</div>';

  // Filtro de periodo
  var gPeriodo=window._gPeriodo||'hoy';
  var now=new Date();
  var gastosVista=gastos.filter(function(g){
    if(gPeriodo==='hoy') return g.fecha===today();
    if(gPeriodo==='semana'){
      var d=new Date(g.fecha+'T00:00:00');
      var diff=(now-d)/(1000*60*60*24);
      return diff>=0&&diff<7;
    }
    if(gPeriodo==='mes') return g.fecha.slice(0,7)===today().slice(0,7);
    return true;
  });
  var totalVista=gastosVista.reduce(function(a,g){return a+g.monto;},0);

  html+='<div class="card">';
  html+='<div style="display:flex;gap:6px;margin-bottom:12px">';
  ['hoy','semana','mes','todo'].forEach(function(p){
    var lbl={hoy:'Hoy',semana:'Semana',mes:'Mes',todo:'Todo'}[p];
    var active=gPeriodo===p;
    html+='<button onclick="setGastoPeriodo(\''+p+'\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid '+(active?'#8b0000':'#ddd')+';background:'+(active?'#8b0000':'#fff')+';color:'+(active?'#fff':'#555')+';cursor:pointer;font-size:13px">'+lbl+'</button>';
  });
  html+='</div>';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  html+='<div class="sl" style="margin:0">'+gastosVista.length+' gastos</div>';
  html+='<div style="font-size:16px;color:#A32D2D">- '+fmt(totalVista)+'</div></div>';
  if(gastosVista.length===0){html+='<div class="empty">Sin gastos en este periodo</div>';}
  else{
    gastosVista.slice().reverse().forEach(function(g){
      html+='<div class="row"><div>';
      html+='<div class="rn">'+g.descripcion+'</div>';
      html+='<div class="rm">'+fmtDate(g.fecha)+' '+g.hora+(g.pago==='yape'?' · <span style="color:#7b2fff">Yape</span>':' · Efectivo')+(g.registradoPor?' · '+g.registradoPor:'')+'</div>';
      html+='</div>';
      html+='<div style="display:flex;align-items:center;gap:6px">';
      html+='<div class="ra" style="color:#A32D2D">-'+fmt(g.monto)+'</div>';
      html+='<button class="btnd" onclick="eliminarGasto(\''+g.id+'\')">x</button>';
      html+='</div></div>';
    });
  }
  html+='</div>';
  html+='<button onclick="exportarGastosCSV()" style="width:100%;background:#fff;border:1px solid #555;color:#555;border-radius:8px;padding:10px;cursor:pointer;font-size:14px;margin-bottom:8px">Exportar gastos CSV</button>';

  document.getElementById('gastos').innerHTML=html;
  window._gastoPago='efectivo';
}

function guardarGasto(){
  var desc=document.getElementById('gasto-desc').value.trim();
  var monto=parseFloat(document.getElementById('gasto-monto').value)||0;
  if(!desc){showToast('Escribe que se va a comprar');return;}
  if(monto<=0){showToast('Ingresa un monto valido');return;}
  var pago=window._gastoPago||'efectivo';
  db.ref('gastos').push({
    descripcion:desc,
    monto:monto,
    pago:pago,
    fecha:today(),
    hora:nowTime(),
    registradoPor:currentUser?currentUser.nombre:'',
    timestamp:new Date().toISOString()
  }).then(function(){
    showToast('Gasto registrado: '+fmt(monto));
    document.getElementById('gasto-desc').value='';
    document.getElementById('gasto-monto').value='';
  });
}

function eliminarGasto(id){
  if(!confirm('¿Eliminar este gasto?'))return;
  db.ref('gastos/'+id).remove().then(function(){showToast('Gasto eliminado');});
}

function renderRecetas(){
  var cont=document.getElementById('recetas');
  var editId=window._editandoReceta||null;
  var editR=editId?recetas.find(function(r){return r.id===editId;}):null;
  var html='';
  
  // Formulario crear/editar
  html+='<div class="card"><div class="sl">'+(editR?'✏️ Editar receta':'➕ Nueva receta')+'</div>';
  html+='<div class="field"><label>Nombre del plato/bebida</label><input type="text" id="rec-nom" placeholder="Ej: Chicha morada" value="'+(editR?(editR.nombre||'').replace(/"/g,'&quot;'):'')+'"></div>';
  html+='<div class="field"><label>Categoría</label><select id="rec-cat">';
  ['Platos de fondo','Sopas','Bebidas','Salsas','Postres','Otros'].forEach(function(c){
    html+='<option value="'+c+'"'+(editR&&editR.categoria===c?' selected':'')+'>'+c+'</option>';
  });
  html+='</select></div>';
  html+='<div class="field"><label>Rinde para</label><input type="text" id="rec-rinde" placeholder="Ej: 5 vasos / 1 litro" value="'+(editR?(editR.rinde||'').replace(/"/g,'&quot;'):'')+'"></div>';
  html+='<div class="field"><label>Ingredientes y cantidades (uno por línea)</label><textarea id="rec-ingr" rows="6" style="width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 12px;font-size:13px;font-family:Nunito,sans-serif;font-weight:600;background:#fff;resize:vertical" placeholder="Ej:&#10;1 kg de maíz morado&#10;2 manzanas&#10;3 clavos de olor&#10;Azúcar al gusto">'+(editR?(editR.ingredientes||''):'')+'</textarea></div>';
  html+='<div class="field"><label>Pasos de preparación (opcional)</label><textarea id="rec-pasos" rows="5" style="width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 12px;font-size:13px;font-family:Nunito,sans-serif;font-weight:600;background:#fff;resize:vertical" placeholder="Ej:&#10;1. Hervir el maíz con las especias por 30 min&#10;2. Colar y dejar enfriar&#10;3. Agregar jugo de limón y azúcar">'+(editR?(editR.pasos||''):'')+'</textarea></div>';
  html+='<div class="field"><label>Notas o tips (opcional)</label><input type="text" id="rec-notas" placeholder="Ej: Servir bien fría con hielo" value="'+(editR?(editR.notas||'').replace(/"/g,'&quot;'):'')+'"></div>';
  
  // Control de visibilidad
  var visibles=editR&&editR.visiblePara?editR.visiblePara:[];
  html+='<div class="field"><label>👁️ ¿Quién puede ver esta receta?</label>';
  html+='<div style="background:#fafbff;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px;margin-top:6px">';
  html+='<div style="font-size:11px;color:#64748b;margin-bottom:8px;text-transform:none;letter-spacing:0;font-weight:600">Marca a los empleados que pueden ver esta receta. Si no marcas a nadie, solo tú la verás.</div>';
  html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;font-size:13px;cursor:pointer;background:#fff;border-radius:8px;border:1px solid #e2e8f0;text-transform:none;letter-spacing:0" onclick="var c=this.querySelector(\'input\');c.checked=!c.checked;toggleTodosRec(c);"><input type="checkbox" id="rec-vis-todos" onclick="event.stopPropagation();toggleTodosRec(this);" '+(visibles.length===personal.length&&personal.length>0?'checked':'')+' style="width:18px;height:18px;cursor:pointer"><span style="font-weight:800;color:#0f172a;text-transform:none;letter-spacing:0">Seleccionar todos</span></div>';
  html+='<div style="max-height:240px;overflow-y:auto;margin-top:8px;border-top:1px solid #e8eaf0;padding-top:8px">';
  personal.forEach(function(p){
    var checked=visibles.indexOf(p.id)>=0?'checked':'';
    html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;font-size:13px;cursor:pointer;border-bottom:1px solid #f1f5f9;text-transform:none;letter-spacing:0" onclick="var c=this.querySelector(\'input\');c.checked=!c.checked;"><input type="checkbox" class="rec-vis-emp" value="'+p.id+'" '+checked+' onclick="event.stopPropagation()" style="width:18px;height:18px;cursor:pointer;flex-shrink:0"><span style="flex:1;font-weight:600;color:#0f172a;text-transform:none;letter-spacing:0">'+p.nombre+'</span><span style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px">'+(p.cargo||'')+'</span></div>';
  });
  html+='</div></div></div>';
  
  if(editR){
    html+='<div style="display:flex;gap:8px"><button class="btn" style="flex:1" onclick="guardarReceta()">Guardar cambios</button><button class="btn" style="flex:1;background:#666!important;box-shadow:none!important" onclick="cancelarEdicionReceta()">Cancelar</button></div>';
  } else {
    html+='<button class="btn" onclick="guardarReceta()">Guardar receta</button>';
  }
  html+='</div>';
  
  // Listado
  html+='<div class="card"><div class="sl">📖 Recetas guardadas ('+recetas.length+')</div>';
  if(recetas.length===0){
    html+='<div class="empty">Aún no hay recetas. Agrega la primera arriba.</div>';
  } else {
    // Buscador
    html+='<div class="field"><input type="text" id="rec-buscar" placeholder="🔍 Buscar receta..." oninput="filtrarRecetas()" style="margin-bottom:10px"></div>';
    html+='<div id="rec-lista">';
    var porCat={};
    recetas.forEach(function(r){var c=r.categoria||'Otros';if(!porCat[c])porCat[c]=[];porCat[c].push(r);});
    Object.keys(porCat).sort().forEach(function(cat){
      html+='<div style="margin:14px 0 6px;font-size:11px;font-weight:800;color:#c1121f;letter-spacing:.8px">'+cat.toUpperCase()+' ('+porCat[cat].length+')</div>';
      porCat[cat].forEach(function(r){
        html+='<div class="receta-item" data-nombre="'+(r.nombre||'').toLowerCase()+'" style="background:#fafbff;border:1px solid #e8eaf0;border-radius:14px;padding:12px;margin-bottom:8px">';
        html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">';
        html+='<div style="flex:1"><div style="font-size:15px;font-weight:800;color:#0f172a">'+r.nombre+'</div>';
        if(r.rinde){html+='<div style="font-size:11px;color:#64748b;margin-top:2px">Rinde: '+r.rinde+'</div>';}
        var vis=r.visiblePara||[];
        var visTxt=vis.length===0?'🔒 Solo admin':vis.length===personal.length?'👁️ Todos los empleados':'👁️ '+vis.length+' empleado'+(vis.length>1?'s':'');
        html+='<div style="font-size:11px;color:#64748b;margin-top:4px;background:#f1f5f9;display:inline-block;padding:3px 8px;border-radius:6px">'+visTxt+'</div>';
        html+='</div>';
        html+='<div style="display:flex;gap:6px"><button class="btnd" style="background:#dbeafe!important;color:#1d4ed8!important" onclick="editarReceta(\''+r.id+'\')">Editar</button>';
        html+='<button class="btnd" onclick="eliminarReceta(\''+r.id+'\')">Eliminar</button></div>';
        html+='</div>';
        if(r.ingredientes){
          html+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid #e8eaf0"><div style="font-size:10px;font-weight:800;color:#64748b;letter-spacing:.5px;margin-bottom:4px">INGREDIENTES</div>';
          html+='<div style="font-size:13px;color:#0f172a;white-space:pre-line;line-height:1.5">'+r.ingredientes+'</div></div>';
        }
        if(r.pasos){
          html+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid #e8eaf0"><div style="font-size:10px;font-weight:800;color:#64748b;letter-spacing:.5px;margin-bottom:4px">PREPARACIÓN</div>';
          html+='<div style="font-size:13px;color:#0f172a;white-space:pre-line;line-height:1.5">'+r.pasos+'</div></div>';
        }
        if(r.notas){
          html+='<div style="margin-top:8px;padding:8px 10px;background:#fef3c7;border-radius:8px;font-size:12px;color:#92400e"><b>💡 Tip:</b> '+r.notas+'</div>';
        }
        html+='</div>';
      });
    });
    html+='</div>';
  }
  html+='</div>';
  cont.innerHTML=html;
}

function filtrarRecetasEmp(){
  var q=(document.getElementById('emp-rec-buscar').value||'').toLowerCase();
  document.querySelectorAll('.emp-receta-item').forEach(function(el){
    el.style.display=el.getAttribute('data-nombre').indexOf(q)>=0?'block':'none';
  });
}
function toggleTodosRec(cb){
  document.querySelectorAll('.rec-vis-emp').forEach(function(c){c.checked=cb.checked;});
}
function filtrarRecetas(){
  var q=(document.getElementById('rec-buscar').value||'').toLowerCase();
  document.querySelectorAll('.receta-item').forEach(function(el){
    el.style.display=el.getAttribute('data-nombre').indexOf(q)>=0?'block':'none';
  });
}

function guardarReceta(){
  var nom=document.getElementById('rec-nom').value.trim();
  var cat=document.getElementById('rec-cat').value;
  var rinde=document.getElementById('rec-rinde').value.trim();
  var ingr=document.getElementById('rec-ingr').value.trim();
  var pasos=document.getElementById('rec-pasos').value.trim();
  var notas=document.getElementById('rec-notas').value.trim();
  if(!nom){showToast('El nombre es obligatorio',true);return;}
  if(!ingr){showToast('Agrega al menos los ingredientes',true);return;}
  var visiblePara=[];
  document.querySelectorAll('.rec-vis-emp:checked').forEach(function(cb){visiblePara.push(cb.value);});
  var data={nombre:nom,categoria:cat,rinde:rinde,ingredientes:ingr,pasos:pasos,notas:notas,visiblePara:visiblePara,timestamp:Date.now()};
  if(window._editandoReceta){
    db.ref('recetas/'+window._editandoReceta).update(data).then(function(){
      window._editandoReceta=null;showToast('Receta actualizada');
    });
  } else {
    db.ref('recetas').push(data).then(function(){showToast('Receta guardada');});
  }
}

function editarReceta(id){
  window._editandoReceta=id;
  renderRecetas();
  window.scrollTo({top:0,behavior:'smooth'});
}

function cancelarEdicionReceta(){
  window._editandoReceta=null;
  renderRecetas();
}

function eliminarReceta(id){
  if(!confirm('¿Eliminar esta receta? Esta acción no se puede deshacer.'))return;
  db.ref('recetas/'+id).remove().then(function(){showToast('Receta eliminada');});
}

function renderProductos(){
  var html='<div class="card"><div class="sl">Agregar producto</div>';
  html+='<div class="g2"><div class="field"><label>Nombre</label><input type="text" id="pp-nom" placeholder="Ej: Arroz con leche"></div>';
  html+='<div class="field"><label>Precio (S/)</label><input type="number" id="pp-precio" placeholder="0.00" step="0.5"></div></div>';
  html+='<div class="field"><label>Turno</label><select id="pp-turno"><option value="desayuno">🌅 Desayuno</option><option value="almuerzo" selected>☀️ Almuerzo</option><option value="cena">🌙 Cena</option><option value="otros">🍴 Otros</option><option value="bebidas">🥤 Bebidas</option></select></div>';
  html+='<button class="btn" onclick="agregarProducto()">Agregar producto</button></div>';
  html+='<div class="card"><div class="sl">Lista de productos ('+productos.length+')</div>';
  if(productos.length===0){html+='<div class="empty">Sin productos</div>';}
  else{productos.forEach(function(p){
    html+='<div class="prod-row"><div><div class="rn">'+p.nombre+'<span class="badge '+turnoClass(p.turno)+'">'+turnoLabel(p.turno)+'</span></div></div>';
    html+='<div style="display:flex;align-items:center;gap:8px"><input class="inp-sm" type="number" value="'+p.precio+'" step="0.5" onchange="editarPrecio(\''+p.id+'\',this.value)">';
    html+='<button class="btnd" onclick="eliminarProducto(\''+p.id+'\')">x</button></div></div>';
  });}
  html+='</div>';
  document.getElementById('productos').innerHTML=html;
}
function agregarProducto(){
  var nom=document.getElementById('pp-nom').value.trim();
  var precio=parseFloat(document.getElementById('pp-precio').value)||0;
  var turno=document.getElementById('pp-turno').value;
  if(!nom||precio<=0){showToast('Completa nombre y precio',true);return;}
  db.ref('productos').push({nombre:nom,precio:precio,turno:turno}).then(function(){showToast('Producto agregado');});
}
function eliminarProducto(id){
  if(!confirm('Eliminar?'))return;
  db.ref('productos/'+id).remove().then(function(){showToast('Eliminado');});
}
function editarPrecio(id,val){
  var precio=parseFloat(val);if(!precio||precio<=0)return;
  db.ref('productos/'+id).update({precio:precio}).then(function(){showToast('Precio actualizado');});
}
</script>
