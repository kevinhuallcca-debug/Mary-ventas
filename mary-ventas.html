/* LOADER */
#loader{position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.loader-logo{font-family:'Nunito',sans-serif}
.loader-sub{font-size:11px;letter-spacing:4px;color:#6b7db3;text-transform:uppercase}
.loader-dot{display:flex;gap:7px;margin-top:4px}
.loader-dot span{width:8px;height:8px;border-radius:50%;background:#e63946;animation:bounce 1s infinite}
.loader-dot span:nth-child(2){animation-delay:.15s}
.loader-dot span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-9px)}}

@media print{
  #loader,nav,.nav,button,.btnd,.lbtn,#login-screen,.metrics{display:none!important}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  body{background:#fff!important;font-size:12px}
  .print-header{display:block!important}
}
.print-header{display:none}

/* LOGIN */
#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:2rem;background:#f0f2f5}
.login-box{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:400px;margin:0 auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.login-logo{text-align:center;margin-bottom:8px}
.login-sub{font-size:11px;letter-spacing:4px;color:#9aa0b4;text-transform:uppercase;text-align:center;margin-top:4px}
.login-divider{width:40px;height:2px;background:#e63946;margin:12px auto 20px}
.login-tabs{display:flex;border-bottom:2px solid #f0f2f5;margin-bottom:20px}
.ltab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:9px;font-size:13px;cursor:pointer;color:#9aa0b4;font-family:'Nunito',sans-serif;margin-bottom:-2px;transition:all 0.2s}
.ltab.on{color:#e63946;border-bottom-color:#e63946;font-weight:700}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:11px;color:#9aa0b4;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.lfield input,.lfield select{width:100%;border:2px solid #f0f2f5;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Nunito',sans-serif;color:#1a1a2e;background:#f8f9fc;transition:all 0.2s}
.lfield input:focus,.lfield select:focus{outline:none;border-color:#e63946;background:#fff}
.lbtn{background:linear-gradient(135deg,#e63946,#c1121f);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;cursor:pointer;width:100%;font-family:'Nunito',sans-serif;font-weight:800;margin-top:4px;box-shadow:0 4px 12px rgba(230,57,70,0.35);transition:all 0.2s}
.lbtn:hover{transform:translateY(-1px)}
.lerror{color:#e63946;font-size:12px;text-align:center;margin-top:8px;min-height:18px}

/* APP */
#app{display:none;max-width:1280px;margin:0 auto;padding:0 16px 80px;background:rgba(245,241,232,.65);backdrop-filter:blur(2px);min-height:100vh}
.top-bar{display:flex;align-items:center;justify-content:space-between;background:#fff;padding:10px 1rem;border-bottom:1px solid #f0f2f5}
.top-bar-logo img{height:36px;object-fit:contain}
.top-bar-right{display:flex;align-items:center;gap:10px}
.user-badge{font-size:11px;background:#1a1a2e;padding:4px 12px;border-radius:20px;color:#fff}
.logout-btn{background:none;border:1.5px solid #e8eaf0;border-radius:8px;padding:4px 12px;font-size:11px;cursor:pointer;color:#9aa0b4;font-family:'Nunito',sans-serif;transition:all 0.2s}
.logout-btn:hover{border-color:#e63946;color:#e63946}
.header{display:none}

/* NAV */
.nav{display:flex;border-bottom:2px solid #f0f2f5;margin:0 1rem;overflow-x:auto;background:#fff;position:sticky;top:0;z-index:50}
.nb{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-size:13px;cursor:pointer;color:#9aa0b4;margin-bottom:-2px;font-family:'Nunito',sans-serif;white-space:nowrap;font-weight:700;transition:all 0.2s}
.nb.on{color:#e63946;border-bottom-color:#e63946}
.nb:hover{color:#1a1a2e}

/* CARDS */
.card{background:#fff;border:1px solid #e8eaf0;border-radius:14px;padding:16px;margin:1rem;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.sl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#9aa0b4;margin-bottom:14px;font-weight:800}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:1rem}
.met{background:#fff;border:1px solid #e8eaf0;border-radius:12px;padding:12px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ml{font-size:10px;color:#9aa0b4;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.mv{font-size:18px;font-weight:800;color:#1a1a2e;margin-top:3px}
.mv.g{color:#16a34a}.mv.r{color:#e63946}.mv.sm{font-size:12px;margin-top:4px}

/* FIELDS */
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#9aa0b4;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.field input,.field select{width:100%;border:2px solid #f0f2f5;border-radius:10px;padding:10px 12px;font-size:14px;font-family:'Nunito',sans-serif;color:#1a1a2e;background:#f8f9fc;transition:all 0.2s}
.field input:focus,.field select:focus{outline:none;border-color:#e63946;background:#fff}

/* BUTTONS */
.btn{width:100%;background:linear-gradient(135deg,#e63946,#c1121f);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;box-shadow:0 4px 12px rgba(230,57,70,0.25);transition:all 0.2s;margin-top:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(230,57,70,0.35)}
.btnd{background:#fee2e2;color:#e63946;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;transition:all 0.2s}
.btnd:hover{background:#e63946;color:#fff}
.back-btn{background:none;border:none;color:#9aa0b4;cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;padding:6px 0;margin-bottom:12px;font-weight:700}
.back-btn:hover{color:#e63946}

/* ROWS */
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2f5}
.rn{font-size:13px;font-weight:700;color:#1a1a2e;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rm{font-size:11px;color:#9aa0b4;margin-top:2px}
.ra{font-size:14px;font-weight:800;color:#1a1a2e}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.bd{background:#dbeafe;color:#1d4ed8}
.br{background:#fee2e2;color:#dc2626}
.ba{background:#fef3c7;color:#92400e}
.bp{background:#f0f2f5;color:#6b7db3}
.bg{background:#ede9fe;color:#7b2fff}

/* EMPLOYEE */
.emp-avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#e63946,#c1121f);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.emp-profile-header{text-align:center;padding:20px 0 12px}
.emp-profile-avatar{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,#e63946,#c1121f);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin:0 auto 12px}
.emp-profile-name{font-size:18px;font-weight:800;color:#1a1a2e}
.emp-profile-cargo{font-size:12px;color:#9aa0b4;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.readonly-note{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:8px 12px;font-size:12px;color:#856404;font-weight:600}

/* MISC */
.inp-sm{border:2px solid #f0f2f5;border-radius:8px;padding:6px 10px;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;text-align:right;background:#f8f9fc;transition:all 0.2s}
.inp-sm:focus{outline:none;border-color:#e63946}
.resumen-box{background:#f8f9fc;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #e8eaf0}
.resumen-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f2f5;font-size:13px}
.resumen-row:last-child{border-bottom:none}
.resumen-row.total{font-size:15px;font-weight:800;color:#1a1a2e;padding-top:10px;margin-top:4px}
.bar-row{margin-bottom:6px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;color:#9aa0b4;margin-bottom:4px}
.bar-bg{height:8px;background:#f0f2f5;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:#e63946;border-radius:4px}
.prod-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2f5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.empty{text-align:center;color:#9aa0b4;padding:30px;font-size:13px}
.emp-view{padding-bottom:60px}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;opacity:0;transition:opacity 0.3s;z-index:1000;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.toast.err{background:#e63946}
.dot{width:8px;height:8px;border-radius:50%;margin-right:6px;display:inline-block}
.dot-in{background:#16a34a}.dot-out{background:#f59e0b}.dot-abs{background:#e63946}.dot-none{background:#d1d5db}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:500}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.sub-nav{display:flex;border-bottom:2px solid #f0f2f5;margin-bottom:14px;overflow-x:auto}
.snb{background:none;border:none;border-bottom:2px solid transparent;padding:8px 14px;font-size:13px;cursor:pointer;color:#9aa0b4;margin-bottom:-2px;font-family:'Nunito',sans-serif;font-weight:700;white-space:nowrap;transition:all 0.2s}
.snb.on{color:#e63946;border-bottom-color:#e63946}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d0d4e0;border-radius:4px}
@media(max-width:700px){
  body{background:#f5f1e8!important}
  #app{background:transparent!important;backdrop-filter:none!important}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .card{margin:.6rem}
  .content-area{padding:8px 10px}
  .pos-grid{grid-template-columns:repeat(2,1fr)!important}
}

/* ═══════════════════════════════════════════════════
   MODERN MOBILE APP REDESIGN - Mary Restaurant
   Inspirado en iOS/Material Design 3
   ═══════════════════════════════════════════════════ */

/* Variables del sistema */
:root{
  --mary-red:#c1121f;
  --mary-red-light:#e63946;
  --mary-red-dark:#8b0000;
  --mary-red-bg:#fef2f3;
  --bg:#f5f6fa;
  --bg-card:#ffffff;
  --text-primary:#0f172a;
  --text-secondary:#64748b;
  --text-tertiary:#94a3b8;
  --border:#e2e8f0;
  --border-light:#f1f5f9;
  --success:#10b981;
  --warning:#f59e0b;
  --danger:#ef4444;
  --shadow-sm:0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 12px rgba(15,23,42,.06);
  --shadow-lg:0 10px 30px rgba(15,23,42,.08);
  --radius-sm:10px;
  --radius:14px;
  --radius-lg:20px;
  --radius-xl:24px;
}

/* body bg ya aplicado arriba */

/* Tarjetas con sombra suave estilo iOS */
.card{
  background:var(--bg-card)!important;
  border:none!important;
  border-radius:var(--radius-lg)!important;
  padding:18px!important;
  box-shadow:var(--shadow-md)!important;
  transition:transform .2s ease,box-shadow .2s ease;
}
.card:hover{box-shadow:var(--shadow-lg)!important}

/* Etiquetas pequeñas */
.sl{
  font-size:11px!important;
  letter-spacing:.8px!important;
  color:var(--text-tertiary)!important;
  font-weight:700!important;
  text-transform:uppercase!important;
}

/* Métricas tipo widgets iOS */
.metrics{gap:12px!important}
.met{
  background:var(--bg-card)!important;
  border:none!important;
  border-radius:18px!important;
  padding:16px 10px!important;
  box-shadow:var(--shadow-sm)!important;
  transition:transform .15s ease;
}
.met:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)!important}
.ml{font-size:10px!important;color:var(--text-tertiary)!important;letter-spacing:.6px!important}
.mv{font-size:22px!important;font-weight:800!important;letter-spacing:-.5px!important;margin-top:6px!important}
.mv.g{color:var(--success)!important}
.mv.r{color:var(--danger)!important}

/* Top bar más limpio */
.top-bar{
  padding:12px 1rem!important;
  border-bottom:1px solid var(--border-light)!important;
  background:rgba(255,255,255,.85)!important;
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
}

.user-badge{
  background:var(--text-primary)!important;
  border-radius:100px!important;
  padding:5px 14px!important;
  font-size:11px!important;
  letter-spacing:.3px;
}

.logout-btn{
  border:1px solid var(--border)!important;
  border-radius:100px!important;
  padding:5px 14px!important;
  font-size:11px!important;
  background:var(--bg-card)!important;
}

/* Nav tabs estilo segmented control */
.nav{
  background:var(--bg-card)!important;
  border-bottom:1px solid var(--border-light)!important;
  padding:0 8px!important;
}
.nb{
  font-size:13px!important;
  padding:14px 16px!important;
  font-weight:700!important;
  border-bottom:2.5px solid transparent!important;
  position:relative;
  transition:color .2s ease;
}
.nb.on{
  color:var(--mary-red)!important;
  border-bottom-color:var(--mary-red)!important;
}

/* Botones primarios estilo iOS */
.btn,.lbtn{
  background:linear-gradient(135deg,var(--mary-red-light) 0%,var(--mary-red) 100%)!important;
  border-radius:14px!important;
  padding:14px!important;
  font-size:15px!important;
  font-weight:800!important;
  letter-spacing:.2px;
  box-shadow:0 8px 20px rgba(193,18,31,.3)!important;
  transition:transform .15s ease,box-shadow .2s ease!important;
}
.btn:active,.lbtn:active{transform:scale(.97)}

/* Botón eliminar más sutil */
.btnd{
  background:var(--mary-red-bg)!important;
  color:var(--mary-red)!important;
  border-radius:8px!important;
  padding:6px 12px!important;
  font-size:11px!important;
}

/* Inputs modernos */
.field input,.field select,.lfield input,.lfield select,.inp-sm{
  border:1.5px solid var(--border)!important;
  border-radius:12px!important;
  background:var(--bg-card)!important;
  font-weight:600!important;
  transition:all .2s ease!important;
}
.field input:focus,.field select:focus,.lfield input:focus,.lfield select:focus{
  border-color:var(--mary-red)!important;
  box-shadow:0 0 0 4px rgba(193,18,31,.08)!important;
}

/* Filas mas elegantes */
.row{
  padding:14px 0!important;
  border-bottom:1px solid var(--border-light)!important;
}
.row:last-child{border-bottom:none!important}

/* Badges pill estilo iOS */
.badge{
  border-radius:100px!important;
  font-weight:700!important;
  letter-spacing:.2px;
  padding:4px 10px!important;
}

/* Avatar empleado más moderno */
.emp-avatar,.emp-profile-avatar{
  background:linear-gradient(135deg,var(--mary-red-light) 0%,var(--mary-red-dark) 100%)!important;
  box-shadow:0 4px 12px rgba(193,18,31,.25);
}
.emp-profile-avatar{
  width:80px!important;
  height:80px!important;
  border-radius:24px!important;
  font-size:30px!important;
}

/* Login box premium */
.login-box{
  border-radius:28px!important;
  padding:2.5rem 2rem!important;
  box-shadow:0 20px 60px rgba(15,23,42,.12)!important;
}

/* Resumen box mejor */
.resumen-box{
  background:linear-gradient(135deg,#fafbff 0%,#f5f6fa 100%)!important;
  border:1px solid var(--border-light)!important;
  border-radius:16px!important;
  padding:16px!important;
}

/* Toast moderno */
.toast{
  border-radius:14px!important;
  box-shadow:0 10px 40px rgba(0,0,0,.25)!important;
  backdrop-filter:blur(10px);
}

/* POS grid - tarjetas de producto */
.pos-grid > div,.pos-grid button{
  border-radius:16px!important;
  transition:transform .15s ease,box-shadow .2s ease!important;
}
.pos-grid > div:active,.pos-grid button:active{transform:scale(.96)}

/* Modal bottom sheet */
.modal-box{
  border-radius:24px 24px 0 0!important;
  padding:24px 20px 32px!important;
  box-shadow:0 -10px 40px rgba(0,0,0,.15)!important;
}
.modal-box::before{
  content:'';
  display:block;
  width:40px;
  height:4px;
  background:var(--border);
  border-radius:2px;
  margin:-8px auto 16px;
}

/* Sub nav */
.snb{
  font-size:13px!important;
  padding:10px 16px!important;
  border-radius:100px!important;
  border-bottom:none!important;
  margin:0 4px!important;
  transition:all .2s ease!important;
}
.snb.on{
  background:var(--mary-red)!important;
  color:#fff!important;
  border-bottom:none!important;
}
.sub-nav{
  border-bottom:none!important;
  padding:8px 0;
  gap:4px;
}

/* Animaciones suaves */
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card,.met{animation:fadeInUp .3s ease backwards}
.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.15s}
.card:nth-child(4){animation-delay:.2s}

/* Mobile tweaks */
@media(max-width:700px){
  .card{padding:16px!important;margin:.6rem!important;border-radius:18px!important}
  .met{padding:14px 8px!important;border-radius:16px!important}
  .mv{font-size:18px!important}
  .nb{padding:12px 12px!important;font-size:12.5px!important}
  .btn,.lbtn{padding:13px!important;font-size:14px!important}
}

/* Smooth scrolling */
html{scroll-behavior:smooth}
*{-webkit-tap-highlight-color:transparent}

/* Efectos focus mejorados */
button:focus-visible{outline:2px solid var(--mary-red);outline-offset:2px}


/* FONDOS FESTIVOS PARA LOGIN */
#login-screen.festive{background-size:cover!important;background-position:center!important;background-repeat:no-repeat!important;position:relative}
#login-screen.festive::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.55);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:0}
#login-screen.festive .login-box{position:relative;z-index:1;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:rgba(255,255,255,.92)!important}
.festive-badge{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);padding:8px 18px;border-radius:100px;font-size:13px;font-weight:800;color:#c1121f;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:2;letter-spacing:.3px}

/* Día de la Madre - Flores rosas */
#login-screen.dia-madre{background-image:url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=1200&q=80')}
/* Día del Padre - Estilo cálido */
#login-screen.dia-padre{background-image:url('https://images.unsplash.com/photo-1503516459261-40c66117780a?w=1200&q=80')}
/* Navidad */
#login-screen.navidad{background-image:url('https://images.unsplash.com/photo-1543589077-47d81606c1bf?w=1200&q=80')}
/* Año Nuevo */
#login-screen.ano-nuevo{background-image:url('https://images.unsplash.com/photo-1467810563316-b5476525c0f9?w=1200&q=80')}
/* Fiestas Patrias Perú (28-29 julio) */
#login-screen.fiestas-patrias{background-image:url('https://images.unsplash.com/photo-1531065208531-4036c0dba3ca?w=1200&q=80')}
/* San Valentín */
#login-screen.san-valentin{background-image:url('https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?w=1200&q=80')}
/* Halloween */
#login-screen.halloween{background-image:url('https://images.unsplash.com/photo-1509557965875-b88c97052f0e?w=1200&q=80')}
/* Aniversario del restaurante (configurable) */
#login-screen.aniversario{background-image:url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1200&q=80')}

</style>
</head>

// ── FONDOS FESTIVOS AUTOMÁTICOS ─────────────────────────────
function aplicarFondoFestivo(){
  var ls=document.getElementById('login-screen');
  if(!ls)return;
  var hoy=new Date();
  var mes=hoy.getMonth()+1; // 1-12
  var dia=hoy.getDate();
  var diaSemana=hoy.getDay(); // 0=domingo
  var clase='';
  var nombre='';
  
  // Día de la Madre Perú: 2do domingo de mayo (rango ampliado para mostrar todo mayo de prueba)
  if(mes===5){clase='dia-madre';nombre='💐 Feliz Día de la Madre';}
  // Día del Padre Perú: 3er domingo de junio
  if(mes===6){
    var primerDomJ=1+((7-new Date(hoy.getFullYear(),5,1).getDay())%7);
    var diaPadre=primerDomJ+14;
    if(dia>=diaPadre-2&&dia<=diaPadre+1){clase='dia-padre';nombre='👔 Feliz Día del Padre';}
  }
  // San Valentín: 14 febrero (rango 12-15)
  if(mes===2&&dia>=12&&dia<=15){clase='san-valentin';nombre='💕 Feliz San Valentín';}
  // Fiestas Patrias Perú: 28-29 julio
  if(mes===7&&dia>=27&&dia<=30){clase='fiestas-patrias';nombre='🇵🇪 Felices Fiestas Patrias';}
  // Halloween: 31 octubre
  if(mes===10&&dia>=30){clase='halloween';nombre='🎃 Feliz Halloween';}
  // Navidad: 20-26 diciembre
  if(mes===12&&dia>=20&&dia<=26){clase='navidad';nombre='🎄 Feliz Navidad';}
  // Año Nuevo: 28 dic - 2 ene
  if((mes===12&&dia>=28)||(mes===1&&dia<=2)){clase='ano-nuevo';nombre='✨ Feliz Año Nuevo';}
  
  // Limpiar clases anteriores
  ls.classList.remove('festive','dia-madre','dia-padre','san-valentin','fiestas-patrias','halloween','navidad','ano-nuevo','aniversario');
  var oldBadge=document.getElementById('festive-badge');
  if(oldBadge)oldBadge.remove();
  
  if(clase){
    ls.classList.add('festive',clase);
    var badge=document.createElement('div');
    badge.id='festive-badge';
    badge.className='festive-badge';
    badge.textContent=nombre;
    ls.appendChild(badge);
  }
}
// Aplicar al cargar y cada hora

  document.body.innerHTML='<div id="emp-app" style="display:block;background:#f0f2f5;min-height:100vh"><div style="display:flex;align-items:center;justify-content:space-between;background:#fff;padding:10px 1rem;border-bottom:1px solid #f0f2f5"><span style="background:#8b0000;color:#fff;padding:6px 14px;border-radius:8px;font-weight:700" id="emp-badge">'+emp.nombre+'</span><button onclick="location.reload()" style="background:#666;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer">Salir</button></div><div id="emp-content" style="padding:1rem;max-width:1280px;margin:0 auto"></div></div>';
  document.getElementById('emp-content').innerHTML='<div style="padding:2rem;text-align:center;color:#888">Cargando...</div>';
  // Re-attach listeners para datos en vivo
  if(!listenersStarted){startListeners();}

  }, 300);

// ── SESIONES ACTIVAS ──────────────────────────────────────────
var sessionId=null;

function generarSessionId(){
  return Date.now().toString(36)+Math.random().toString(36).substr(2,6);
}

function getDeviceInfo(){
  var ua=navigator.userAgent;
  var device='Computadora';
  if(/Android/i.test(ua))device='Android';
  else if(/iPhone|iPad/i.test(ua))device='iPhone/iPad';
  else if(/Windows/i.test(ua))device='Windows';
  else if(/Mac/i.test(ua))device='Mac';
  var browser='Navegador';
  if(/Chrome/i.test(ua)&&!/Chromium/i.test(ua))browser='Chrome';
  else if(/Firefox/i.test(ua))browser='Firefox';
  else if(/Safari/i.test(ua)&&!/Chrome/i.test(ua))browser='Safari';
  else if(/Edg/i.test(ua))browser='Edge';
  return device+' · '+browser;
}

function registrarSesion(){
  sessionId=generarSessionId();
  var info={
    id:sessionId,
    dispositivo:getDeviceInfo(),
    inicio:new Date().toLocaleString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    timestamp:Date.now(),
    activa:true
  };
  db.ref('sesiones/'+sessionId).set(info);
  // Auto-limpiar al cerrar ventana
  window.addEventListener('beforeunload',function(){
    db.ref('sesiones/'+sessionId).remove();
    // Firebase SESSION persistence se limpia sola al cerrar la pestaña
  });
  // Escuchar si esta sesion fue cerrada remotamente
  db.ref('sesiones/'+sessionId+'/activa').on('value',function(snap){
    if(snap.val()===false){
      sessionId=null;
      logout();
      showToast('Sesión cerrada remotamente');
    }
  });
}

function renderSesiones(){
  db.ref('sesiones').once('value',function(snap){
    var sels=[];
    snap.forEach(function(c){sels.push(Object.assign({id:c.key},c.val()));});
    sels.sort(function(a,b){return b.timestamp-a.timestamp;});
    var html='<div class="card"><div class="sl">🔒 Sesiones activas</div>';
    html+='<div style="font-size:12px;color:#aaa;margin-bottom:12px">Dispositivos con tu sistema abierto ahora mismo</div>';
    if(sels.length===0){
      html+='<div class="empty">No hay sesiones activas</div>';
    } else {
      sels.forEach(function(s){
        var esCurrent=s.id===sessionId;
        html+='<div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid #f0e8d8">';
        html+='<div style="width:36px;height:36px;border-radius:50%;background:'+(esCurrent?'#0F6E56':'#8b0000')+';display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">';
        html+=(s.dispositivo&&s.dispositivo.indexOf('Android')>-1||s.dispositivo&&s.dispositivo.indexOf('iPhone')>-1?'📱':'💻')+'</div>';
        html+='<div style="flex:1">';
        html+='<div style="font-size:14px;font-weight:600;color:#333">'+s.dispositivo+'</div>';
        html+='<div style="font-size:11px;color:#aaa">Desde: '+s.inicio+'</div>';
        if(esCurrent)html+='<div style="font-size:11px;color:#0F6E56;font-weight:600">← Este dispositivo</div>';
        html+='</div>';
        if(!esCurrent){
          html+='<button onclick="cerrarSesionRemota(\''+s.id+'\')" style="background:#8b0000;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer">Cerrar</button>';
        }
        html+='</div>';
      });
      if(sels.length>1){
        html+='<button onclick="cerrarTodasSesiones()" style="width:100%;margin-top:12px;background:#cc3333;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;cursor:pointer">Cerrar todas las otras sesiones</button>';
      }
    }
    html+='<button onclick="renderSesiones()" style="width:100%;margin-top:8px;background:#f9f5ef;color:#555;border:1px solid #e0d5c5;border-radius:8px;padding:10px;font-size:13px;cursor:pointer">🔄 Actualizar</button>';
    html+='</div>';
    document.getElementById('sesiones').innerHTML=html;
  });
}

function cerrarSesionRemota(sid){
  if(!confirm('¿Cerrar esta sesión remotamente?'))return;
  db.ref('sesiones/'+sid).update({activa:false}).then(function(){
    setTimeout(function(){db.ref('sesiones/'+sid).remove();},3000);
    showToast('Sesión cerrada');
    renderSesiones();
  });
}

function cerrarTodasSesiones(){
  if(!confirm('¿Cerrar todas las sesiones excepto esta?'))return;
  db.ref('sesiones').once('value',function(snap){
    var updates={};
    snap.forEach(function(c){
      if(c.key!==sessionId){updates[c.key+'/activa']=false;}
    });
    db.ref('sesiones').update(updates).then(function(){
      setTimeout(function(){
        db.ref('sesiones').once('value',function(s2){
          s2.forEach(function(c){if(c.key!==sessionId)db.ref('sesiones/'+c.key).remove();});
        });
      },3000);
      showToast('Todas las otras sesiones cerradas');
      renderSesiones();
    });
  });
}

function renderEmpView(empId){
  try{
  var emp=null;for(var i=0;i<personal.length;i++){if(personal[i].id===empId){emp=personal[i];break;}}
  if(!emp){document.getElementById('emp-content').innerHTML='<div style="padding:2rem;color:red">Error: empleado no encontrado en personal (id='+empId+')</div>';return;}

  // Ultimo pago
  var pagosEmp=pagos.filter(function(p){return p.personalId===empId;});
  pagosEmp.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  var ultimoPago=pagosEmp.length?pagosEmp[0].fecha:null;

  // Todas las asistencias
  var todaAsis=asistencias.filter(function(a){return a.personalId===empId;});
  var asisDesde=ultimoPago?todaAsis.filter(function(a){return a.fecha>ultimoPago;}):todaAsis;

  var diasT=[];asisDesde.forEach(function(a){if((a.estado==='asistio'||a.estado==='medio tiempo'||a.estado==='descanso pagado')&&diasT.indexOf(a.fecha)<0)diasT.push(a.fecha);});
  var diasF=[];asisDesde.forEach(function(a){if(a.estado==='no asistio'&&diasF.indexOf(a.fecha)<0)diasF.push(a.fecha);});
  var diasMed=asisDesde.filter(function(a){return a.estado==='medio tiempo';}).length;

  var adEmp=adelantos.filter(function(a){return a.personalId===empId&&!a.liquidado&&(!ultimoPago||a.fecha>ultimoPago);});
  var totalAd=adEmp.reduce(function(a,x){return a+x.monto;},0);

  // Calcular ganado por dias con historial de sueldos
  var sueldoDiaEmp=emp.sueldoDia||emp.sueldo||0;
  var histSEmp=(emp.historialSueldos||[]).slice().sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
  function getSueldoEmp(fecha){
    var s=sueldoDiaEmp;
    for(var i=histSEmp.length-1;i>=0;i--){if(histSEmp[i].fecha<=fecha){s=histSEmp[i].monto;break;}}
    return s;
  }
  var ganadoEmp=0;
  diasT.forEach(function(f){
    var s=getSueldoEmp(f);
    var esMed=asisDesde.some(function(a){return a.fecha===f&&a.estado==='medio tiempo';});
    if(esMed){var rm=asisDesde.find(function(a){return a.fecha===f&&a.estado==='medio tiempo';});ganadoEmp+=(rm&&rm.montoFijo!=null)?rm.montoFijo:s*((rm&&rm.porcentaje||50)/100);}else{ganadoEmp+=s;}
  });
  var saldo=ganadoEmp-totalAd;

  var html='<div class="emp-view">';
  html+='<div class="emp-profile-header">';
  html+='<div class="emp-profile-avatar">'+initials(emp.nombre)+'</div>';
  html+='<div class="emp-profile-name">'+emp.nombre+'</div>';
  html+='<div class="emp-profile-cargo">'+emp.cargo+'</div></div>';
  html+='<div style="padding:0 1rem"><div class="readonly-note" style="margin:0 0 1rem">Vista de solo lectura</div></div>';

  // Resumen desde ultimo pago
  var diasCompletosEmp=diasT.filter(function(f){return !asisDesde.some(function(a){return a.fecha===f&&(a.estado==='medio tiempo'||a.estado==='descanso pagado');});}).length;
  var diasDescansoEmp=asisDesde.filter(function(a){return a.estado==='descanso pagado';}).length;
  html+='<div class="card"><div class="sl">Mi resumen</div>';
  if(ultimoPago){html+='<div style="font-size:12px;color:#0F6E56;margin-bottom:8px">Desde: '+fmtDate(ultimoPago)+'</div>';}
  html+='<div class="resumen-box">';
  html+='<div class="resumen-row"><span>Sueldo por día</span><span style="color:#0F6E56">'+fmt(sueldoDiaEmp)+'/día</span></div>';
  html+='<div class="resumen-row"><span>Días completos trabajados</span><span>'+diasCompletosEmp+' días</span></div>';
  if(diasDescansoEmp>0){html+='<div class="resumen-row"><span>Descanso pagado</span><span style="color:#7b2fff">'+diasDescansoEmp+' días</span></div>';}
  if(diasMed>0){html+='<div class="resumen-row"><span>Medio tiempo</span><span style="color:#854F0B">'+diasMed+' días</span></div>';}
  html+='<div class="resumen-row"><span>Faltas</span><span style="color:'+(diasF.length>0?'#A32D2D':'#888')+'">'+diasF.length+' días</span></div>';
  html+='<div class="resumen-row"><span>Total ganado</span><span style="color:#0F6E56">'+fmt(ganadoEmp)+'</span></div>';
  html+='<div class="resumen-row"><span>Adelantos</span><span style="color:#854F0B">- '+fmt(totalAd)+'</span></div>';
  html+='<div class="resumen-row total"><span>Saldo a cobrar</span><span style="color:'+(saldo<0?'#cc3333':'#0F6E56')+'">'+fmt(saldo)+'</span></div>';
  html+='</div></div>';

  // Mini calendario continuo igual que admin
  // Empezar calendario desde: primera asistencia o mes del ultimo pago
  var todasSorted=todaAsis.slice().sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
  var primeraAsis=todasSorted.length?todasSorted[0].fecha:today();
  var fechaInicio=ultimoPago&&ultimoPago<primeraAsis?ultimoPago:primeraAsis;
  if(!ultimoPago&&!todaAsis.length)fechaInicio=today();
  var dCursor=new Date(fechaInicio.slice(0,4),parseInt(fechaInicio.slice(5,7))-1,1);
  var dHoyD=new Date(today().slice(0,4),parseInt(today().slice(5,7))-1,1);
  var days=['D','L','M','M','J','V','S'];
  var mnames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  while(dCursor<=dHoyD){
    var calYear=dCursor.getFullYear();var calMonth=dCursor.getMonth();
    var firstDay=new Date(calYear,calMonth,1).getDay();
    var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    html+='<div class="card" style="padding:12px"><div style="font-size:13px;font-weight:600;color:#8b0000;margin-bottom:8px">'+mnames[calMonth]+' '+calYear+'</div>';
    html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">';
    days.forEach(function(d){html+='<div style="text-align:center;font-size:10px;color:#aaa;font-weight:600">'+d+'</div>';});
    html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
    for(var i=0;i<firstDay;i++){html+='<div></div>';}
    for(var d=1;d<=daysInMonth;d++){
      var ds=calYear+'-'+(calMonth+1<10?'0':'')+(calMonth+1)+'-'+(d<10?'0':'')+d;
      var antesDelPago=ultimoPago&&ds<=ultimoPago;
      var futura=ds>today();
      var regsDs=todaAsis.filter(function(a){return a.fecha===ds;});
      var ultDs=regsDs.length?regsDs[regsDs.length-1]:null;
      var isT=ultDs&&ultDs.estado==='asistio';
      var isDes=ultDs&&ultDs.estado==='descanso pagado';
      var isMed=ultDs&&ultDs.estado==='medio tiempo';
      var isF=ultDs&&ultDs.estado==='no asistio';
      var isToday=ds===today();
      var bg=antesDelPago?(isT||isDes?'#2d6a4f':isMed?'#52b788':isF?'#95d5b2':'#e8e4de'):futura?'#f9f7f4':isT?'#185FA5':isDes?'#7b2fff':isMed?'#854F0B':isF?'#A32D2D':'#f0ede8';
      var color=antesDelPago?(isT||isDes||isMed||isF?'#fff':'#ccc'):futura?'#ccc':(isT||isDes||isMed||isF)?'#fff':'#888';
      var border=isToday?'2px solid #8b0000':'2px solid transparent';
      var labelDs=ultDs?(ultDs.estado==='asistio'?'✅ Asistió':ultDs.estado==='descanso pagado'?'🏖️ Descanso pagado':ultDs.estado==='medio tiempo'?'🟡 Medio tiempo':ultDs.estado==='no asistio'?'❌ No asistió':''):'Sin registro';
      var titleDs=(antesDelPago?'[Cancelado] ':'')+labelDs;
      html+='<div title="'+titleDs+'" style="text-align:center;padding:5px 2px;border-radius:6px;background:'+bg+';color:'+color+';font-size:12px;border:'+border+';cursor:default">'+d+'</div>';
    }
    html+='</div></div>';
    dCursor.setMonth(dCursor.getMonth()+1);
  }
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;padding:0 1rem 8px">';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#185FA5"></div><span style="font-size:11px;color:#555">Trabajó</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#7b2fff"></div><span style="font-size:11px;color:#555">Descanso pagado</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#854F0B"></div><span style="font-size:11px;color:#555">Medio tiempo</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#A32D2D"></div><span style="font-size:11px;color:#555">Faltó</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#f0ede8;border:1px solid #ddd"></div><span style="font-size:11px;color:#555">Sin registrar</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#e8e4de"></div><span style="font-size:11px;color:#555">Ya pagado</span></div>';
  html+='</div>';

  // Adelantos
  html+='<div class="card"><div class="sl">Mis adelantos este mes</div>';

var listenersStarted=false;
function startListeners(){
  if(listenersStarted)return;listenersStarted=true;
  db.ref('productos').on('value',function(snap){
    productos=[];snap.forEach(function(c){productos.push(Object.assign({id:c.key},c.val()))});
    productos.sort(function(a,b){return a.nombre.localeCompare(b.nombre)});
    if(productos.length===0){defaultProductos.forEach(function(p){db.ref('productos').push(p)})}
    render();
  });
  db.ref('mesas').on('value',function(snap){
    mesas={};
    snap.forEach(function(c){
      var m=c.val();
      if(m){
        // Firebase guarda arrays como objetos - convertir
        if(m.items&&!Array.isArray(m.items)){
          m.items=Object.values(m.items);
        }
        if(!m.items)m.items=[];
        mesas[c.key]=m;
      }
    });
    if(activeTab==='nueva')renderNueva();
  });
  db.ref('ventas').on('value',function(snap){
    ventas=[];snap.forEach(function(c){ventas.push(Object.assign({id:c.key},c.val()))});
    ventas.sort(function(a,b){return(b.timestamp||'').localeCompare(a.timestamp||'')});
    render();
  });
  db.ref('personal').on('value',function(snap){
    personal=[];snap.forEach(function(c){personal.push(Object.assign({id:c.key},c.val()))});
    personal.sort(function(a,b){return a.nombre.localeCompare(b.nombre)});
    migrarSueldoExistentes();
    // Si hay un empleado logueado, refrescar su vista
    if(currentUser&&currentUser.rol==='empleado'){
      var empActual=personal.find(function(p){return p.id===currentUser.personalId;});
      if(empActual)renderEmpView(empActual.id);
    };
    render();

    var sel=document.getElementById('emp-select');
    if(sel){
      var cur=sel.value;
      sel.innerHTML='<option value="">-- Elige tu nombre --</option>';
      personal.forEach(function(p){if(p.pin){sel.innerHTML+='<option value="'+p.id+'">'+p.nombre+'</option>';}});
      sel.value=cur;
    }
  });
  db.ref('asistencias').on('value',function(snap){
    asistencias=[];snap.forEach(function(c){asistencias.push(Object.assign({id:c.key},c.val()))});
    render();refreshEmpView();
  });
  db.ref('adelantos').on('value',function(snap){
    adelantos=[];snap.forEach(function(c){adelantos.push(Object.assign({id:c.key},c.val()))});
    render();refreshEmpView();
  });
  db.ref('pagos').on('value',function(snap){
    pagos=[];snap.forEach(function(c){pagos.push(Object.assign({id:c.key},c.val()))});
    render();refreshEmpView();
  });
  db.ref('cajaAperturas').on('value',function(snap){
    cajaAperturas=[];snap.forEach(function(c){cajaAperturas.push(Object.assign({id:c.key},c.val()))});
    render();
  });
  db.ref('gastos').on('value',function(snap){
    gastos=[];snap.forEach(function(c){gastos.push(Object.assign({id:c.key},c.val()))});
    render();
  });
  db.ref('recetas').on('value',function(snap){
    recetas=[];snap.forEach(function(c){recetas.push(Object.assign({id:c.key},c.val()))});
    recetas.sort(function(a,b){return(a.nombre||'').localeCompare(b.nombre||'')});

function showTab(name){
  activeTab=name;selectedEmpId=null;
  document.querySelectorAll('.nb').forEach(function(b){
    var dt=b.getAttribute('data-tab');
    if(dt){b.classList.toggle('on',dt===name);}
    else{b.classList.toggle('on',b.getAttribute('onclick')&&b.getAttribute('onclick').indexOf("'"+name+"'")>-1);}
  });
  ['dashboard','nueva','historial','personal','productos','recetas','gastos','sesiones'].forEach(function(t){
    document.getElementById(t).style.display=t===name?'block':'none';
  });
  render();
}
function render(){
  if(!currentUser||(currentUser.rol!=='admin'&&currentUser.rol!=='cajero'))return;
  if(activeTab==='dashboard')renderDashboard();
  else if(activeTab==='nueva')renderNueva();
  else if(activeTab==='historial')renderHistorial();
  else if(activeTab==='personal'){if(selectedEmpId)renderEmpDetail();else renderPersonalList();}
  else if(activeTab==='gastos')renderGastos();
  else if(activeTab==='productos')renderProductos();
  else if(activeTab==='recetas')renderRecetas();
  else if(activeTab==='sesiones')renderSesiones();
}

// ── POS VARIABLES ─────────────────────────────────────────────
var carritoItems=[];
var modoVenta='rapido';
var mesas={};
var mesaActiva=null;
var posCategoria='todas';
var posBusqueda='';
function getTurnoAuto(){
  var h=new Date().getHours();
  var m=new Date().getMinutes();
  var hm=h*60+m;
  if(hm>=360&&hm<570)return'desayuno';
  if(hm>=570&&hm<990)return'almuerzo';
  if(hm>=990&&hm<1200)return'cena';
  return'almuerzo';
}


function cerrarMesaSinPagar(){
  if(!mesaActiva)return;
  if(!confirm('¿Cancelar esta mesa?'))return;
  db.ref('mesas/'+mesaActiva).remove().then(function(){mesaActiva=null;renderNueva();});
}
function renderNueva(){
  var cont=document.getElementById('nueva');
  // posVista: 'productos' | 'pedido'  — solo relevante en móvil
  if(!window.posVista) window.posVista='productos';
  cont.innerHTML='<div id="pos-root"></div>';
  renderPOS();
}

function renderPOS(){
  try{
  var root=document.getElementById('pos-root');
  if(!root)return;

  if(productos.length===0){
    root.innerHTML='<div style="text-align:center;padding:60px;color:#aaa"><div style="font-size:40px;margin-bottom:12px">⏳</div><div style="font-size:14px">Cargando productos...</div></div>';
    setTimeout(function(){if(activeTab==='nueva'&&productos.length>0)renderNueva();},500);
    return;
  }

  var isMobile=window.innerWidth<=700;
  var vista=window.posVista||'productos';

  // Carrito activo
  var carrito=modoVenta==='mesas'&&mesaActiva&&mesas[mesaActiva]
    ?(Array.isArray(mesas[mesaActiva].items)?mesas[mesaActiva].items:(mesas[mesaActiva].items?Object.values(mesas[mesaActiva].items):[]))
    :carritoItems;
  var pendientes=carrito.filter(function(it){return !it.cobrado;});
  var total=pendientes.reduce(function(a,it){return a+it.subtotal;},0);
  var turnoAuto=window._turnoSeleccionado||getTurnoAuto();
  var mesaActObj=modoVenta==='mesas'&&mesaActiva?mesas[mesaActiva]:null;
  var pagoVal=mesaActObj?mesaActObj.pago||'efectivo':posPago;

  // Categorias
  var cats=['todas'];
  productos.forEach(function(p){if(p.turno&&cats.indexOf(p.turno)<0)cats.push(p.turno);});
  var filtrados=productos.filter(function(p){
    return (posCategoria==='todas'||p.turno===posCategoria)&&
           (!posBusqueda||p.nombre.toLowerCase().indexOf(posBusqueda.toLowerCase())>=0);
  });

  var html='';

  // ── TABS MÓVIL ──────────────────────────────────────────────
  if(isMobile){
    var cnt=pendientes.length;
    html+='<div style="display:flex;background:#fff;border-bottom:2px solid #f0e8d8;position:sticky;top:42px;z-index:40">';
    html+='<button onclick="posSetVista(\'productos\')" style="flex:1;padding:11px 0;border:none;border-bottom:3px solid '+(vista==='productos'?'#8b0000':'transparent')+';background:none;font-size:14px;font-weight:700;cursor:pointer;color:'+(vista==='productos'?'#8b0000':'#999')+';font-family:inherit">🍽️ Productos</button>';
    html+='<button onclick="posSetVista(\'pedido\')" style="flex:1;padding:11px 0;border:none;border-bottom:3px solid '+(vista==='pedido'?'#8b0000':'transparent')+';background:none;font-size:14px;font-weight:700;cursor:pointer;color:'+(vista==='pedido'?'#8b0000':'#999')+';font-family:inherit">🛒 Pedido'+(cnt>0?' <span style="background:#8b0000;color:#fff;border-radius:10px;padding:1px 7px;font-size:12px">'+cnt+'</span>':'')+'</button>';
    html+='</div>';
  }

  // ── LAYOUT WRAPPER ───────────────────────────────────────────
  html+='<div style="display:flex;flex-direction:'+(isMobile?'column':'row')+';min-height:500px">';

// POS helpers
var posPago='efectivo';

function posSetVista(v){window.posVista=v;renderPOS();}
function setPosMode(m){modoVenta=m;mesaActiva=null;carritoItems=[];window.posVista='productos';renderPOS();}
function posSetCat(c){posCategoria=c;renderPOS();}
function posBuscar(v){
  posBusqueda=v;
  renderPOS();
  // Restaurar foco en el buscador
  var inp=document.getElementById('pos-busqueda');
  if(inp){inp.focus();inp.value=v;inp.setSelectionRange(v.length,v.length);}
}
function posTurnoChange(){
  var el=document.getElementById('pos-turno');
  if(el)window._turnoSeleccionado=el.value;
  renderPOS();
}

function posSelMesa(mid){
  mesaActiva=mid;
  if(!mesas[mid]){
    var turnoEl=document.getElementById('pos-turno');
    var t=turnoEl?turnoEl.value:getTurnoAuto();
    db.ref('mesas/'+mid).set({nombre:'Mesa '+(mid.replace('mesa_','')),items:[],turno:t,pago:'efectivo',creadoPor:currentUser?currentUser.nombre:'',timestamp:Date.now()});
  }
  renderPOS();
}

function posSetPago(p){
  posPago=p;
  if(modoVenta==='mesas'&&mesaActiva){
    db.ref('mesas/'+mesaActiva).update({pago:p});
  }
  renderPOS();
}

function posAgregarProducto(prodId){
  var prod=productos.find(function(p){return p.id===prodId;});
  if(!prod)return;
  if(modoVenta==='mesas'){
    if(!mesaActiva){showToast('Selecciona una mesa primero',true);return;}
    var m=mesas[mesaActiva]||{items:[]};
    var items=Array.isArray(m.items)?m.items.slice():(m.items?Object.values(m.items):[]);
    var existe=items.findIndex(function(it){return it.prodId===prod.id&&it.precioUnit===prod.precio&&!it.cobrado;});
    if(existe>=0){items[existe].cantidad++;items[existe].subtotal=items[existe].cantidad*items[existe].precioUnit;}
    else{items.push({prodId:prod.id,nombre:prod.nombre,cantidad:1,precioUnit:prod.precio,subtotal:prod.precio});}
    var turnoEl=document.getElementById('pos-turno');
    db.ref('mesas/'+mesaActiva).update({items:items,turno:turnoEl?turnoEl.value:getTurnoAuto(),ultimoEditor:currentUser?currentUser.nombre:''});
    if(window.innerWidth<=700){window.posVista='pedido';}
  } else {
    var existe2=carritoItems.findIndex(function(it){return it.prodId===prod.id&&it.precioUnit===prod.precio;});
    if(existe2>=0){carritoItems[existe2].cantidad++;carritoItems[existe2].subtotal=carritoItems[existe2].cantidad*carritoItems[existe2].precioUnit;}
    else{carritoItems.push({prodId:prod.id,nombre:prod.nombre,cantidad:1,precioUnit:prod.precio,subtotal:prod.precio});}
    // En móvil, cambiar automáticamente al pedido
    if(window.innerWidth<=700){window.posVista='pedido';}
    renderPOS();
  }
}

function posEditarCant(idx,val){
  var cant=parseInt(val);
  if(isNaN(cant)||cant<1)cant=1;
  if(modoVenta==='mesas'&&mesaActiva){
    var m=mesas[mesaActiva];
    var items=Array.isArray(m.items)?m.items.slice():(m.items?Object.values(m.items):[]);
    var pend=items.filter(function(it){return !it.cobrado;});
    if(!pend[idx])return;
    var realIdx=items.indexOf(pend[idx]);
    items[realIdx].cantidad=cant;
    items[realIdx].subtotal=cant*items[realIdx].precioUnit;
    db.ref('mesas/'+mesaActiva).update({items:items,ultimoEditor:currentUser?currentUser.nombre:''});
  } else {
    carritoItems[idx].cantidad=cant;
    carritoItems[idx].subtotal=cant*carritoItems[idx].precioUnit;
    renderPOS();
  }
}

function posCambiarCant(idx,delta){
  if(modoVenta==='mesas'&&mesaActiva){
    var m=mesas[mesaActiva];
    var items=Array.isArray(m.items)?m.items.slice():(m.items?Object.values(m.items):[]);
    var pend=items.filter(function(it){return !it.cobrado;});
    if(!pend[idx])return;
    var realIdx=items.indexOf(pend[idx]);
    items[realIdx].cantidad+=delta;
    if(items[realIdx].cantidad<=0)items.splice(realIdx,1);
    else items[realIdx].subtotal=items[realIdx].cantidad*items[realIdx].precioUnit;
    db.ref('mesas/'+mesaActiva).update({items:items,ultimoEditor:currentUser?currentUser.nombre:''});
  } else {
    carritoItems[idx].cantidad+=delta;
    if(carritoItems[idx].cantidad<=0)carritoItems.splice(idx,1);
    else carritoItems[idx].subtotal=carritoItems[idx].cantidad*carritoItems[idx].precioUnit;
    renderPOS();
  }
}

function posQuitarItem(idx){
  if(modoVenta==='mesas'&&mesaActiva){
    var m=mesas[mesaActiva];
    var items=Array.isArray(m.items)?m.items.slice():(m.items?Object.values(m.items):[]);
    var pend=items.filter(function(it){return !it.cobrado;});
    if(!pend[idx])return;
    var realIdx=items.indexOf(pend[idx]);
    items.splice(realIdx,1);
    db.ref('mesas/'+mesaActiva).update({items:items,ultimoEditor:currentUser?currentUser.nombre:''});
  } else {
    carritoItems.splice(idx,1);
    renderPOS();
  }
}

function posRegistrar(){
  var turnoEl=document.getElementById('pos-turno');
  var turno=turnoEl?turnoEl.value:getTurnoAuto();
  var fecha=today();var hora=nowTime();var ts=new Date().toISOString();
  if(modoVenta==='mesas'&&mesaActiva){
    var m=mesas[mesaActiva];
    var mitems=Array.isArray(m.items)?m.items:(m.items?Object.values(m.items):[]);
    var pend=mitems.filter(function(it){return !it.cobrado;});
    if(pend.length===0){showToast('Sin productos pendientes',true);return;}
    var pago=m.pago||posPago;
    var total=pend.reduce(function(a,it){return a+it.subtotal;},0);
    var obs='Mesa '+(mesaActiva.replace('mesa_',''));
    Promise.all(pend.map(function(it){
      return db.ref('ventas').push({producto:it.nombre,prodId:it.prodId,cantidad:it.cantidad,precioUnit:it.precioUnit,total:it.subtotal,turno:turno,fecha:fecha,hora:hora,obs:obs,pago:pago,timestamp:ts});
    })).then(function(){
      return db.ref('mesas/'+mesaActiva).remove();
    }).then(function(){
      showToast('✓ Mesa cobrada — '+fmt(total));
      mesaActiva=null;renderPOS();
    });
  } else {
    if(carritoItems.length===0){showToast('Agrega productos',true);return;}
    var total2=carritoItems.reduce(function(a,it){return a+it.subtotal;},0);
    Promise.all(carritoItems.map(function(it){
      return db.ref('ventas').push({producto:it.nombre,prodId:it.prodId,cantidad:it.cantidad,precioUnit:it.precioUnit,total:it.subtotal,turno:turno,fecha:fecha,hora:hora,obs:'',pago:posPago,timestamp:ts});
    })).then(function(){
      showToast('✓ Venta registrada — '+fmt(total2));
      carritoItems=[];renderPOS();
    });
  }
}

function posCobrarParcial(){
  if(!mesaActiva||!mesas[mesaActiva])return;
  var m=mesas[mesaActiva];
  var mitems=Array.isArray(m.items)?m.items:(m.items?Object.values(m.items):[]);
  var pend=mitems.filter(function(it){return !it.cobrado;});
  if(pend.length===0){showToast('Sin productos pendientes',true);return;}
  // Mostrar popup para elegir cuantos cobrar
  var msg='¿Cuántos productos cobrar ahora?\n\n';
  pend.forEach(function(it,i){msg+=(i+1)+'. '+it.nombre+' x'+it.cantidad+' = '+fmt(it.subtotal)+'\n';});
  msg+='\nEscribe los números separados por coma (ej: 1,3)';
  var resp=prompt(msg);
  if(!resp)return;
  var indices=resp.split(',').map(function(x){return parseInt(x.trim())-1;}).filter(function(i){return i>=0&&i<pend.length;});
  if(indices.length===0){showToast('Índices inválidos',true);return;}
  var turnoEl=document.getElementById('pos-turno');
  var turno=turnoEl?turnoEl.value:getTurnoAuto();
  var fecha=today();var hora=nowTime();var ts=new Date().toISOString();
  var pago=m.pago||posPago;
  var obs='Mesa '+(mesaActiva.replace('mesa_',''))+' (parcial)';
  var selItems=indices.map(function(i){return pend[i];});
  var totalParcial=selItems.reduce(function(a,it){return a+it.subtotal;},0);
  Promise.all(selItems.map(function(it){
    return db.ref('ventas').push({producto:it.nombre,prodId:it.prodId,cantidad:it.cantidad,precioUnit:it.precioUnit,total:it.subtotal,turno:turno,fecha:fecha,hora:hora,obs:obs,pago:pago,timestamp:ts});
  })).then(function(){
    // Marcar como cobrados
    var newItems=mitems.map(function(it){
      if(selItems.indexOf(it)>=0)return Object.assign({},it,{cobrado:true});
      return it;
    });
    var quedanPend=newItems.filter(function(it){return !it.cobrado;});
    if(quedanPend.length===0){
      return db.ref('mesas/'+mesaActiva).remove().then(function(){
        showToast('✓ Mesa completamente cobrada — '+fmt(totalParcial));
        mesaActiva=null;renderPOS();
      });
    }
    return db.ref('mesas/'+mesaActiva).update({items:newItems}).then(function(){
      showToast('✓ Cobro parcial — '+fmt(totalParcial));
      renderPOS();
    });
  });
}


function guardarVenta(){
  if(carritoItems.length===0){showToast('Agrega al menos un producto',true);return;}
  var turno=document.getElementById('np-turno').value;
  var fecha=document.getElementById('np-fecha').value||today();
  var obs=document.getElementById('np-obs').value;
  var pago=document.getElementById('np-pago').value;
  var hora=nowTime();
  var ts=new Date().toISOString();
  var total=carritoItems.reduce(function(a,it){return a+it.subtotal;},0);
  // Guardar cada item como venta separada (compatible con historial existente)
  var promesas=carritoItems.map(function(it){
    return db.ref('ventas').push({
      producto:it.nombre,prodId:it.prodId,cantidad:it.cantidad,
      precioUnit:it.precioUnit,total:it.subtotal,
      turno:turno,fecha:fecha,hora:hora,obs:obs,pago:pago,timestamp:ts
    });
  });
  Promise.all(promesas).then(function(){
    showToast('✓ Venta registrada — '+fmt(total));
    carritoItems=[];
    showTab('dashboard');
  });
}
function eliminarVenta(id){
  if(!confirm('Eliminar esta venta?'))return;

}

function renderHistorial(){
  var filtradas=ventas.filter(function(v){
    if(filterTurno!=='todos'&&v.turno!==filterTurno)return false;
    if(filterDate&&v.fecha!==filterDate)return false;return true;
  });
  var totalFiltrado=filtradas.reduce(function(a,v){return a+v.total},0);
  var totalYape=filtradas.filter(function(v){return v.pago==='yape'}).reduce(function(a,v){return a+v.total},0);
  var totalEfectivo=filtradas.filter(function(v){return v.pago!=='yape'}).reduce(function(a,v){return a+v.total},0);

  // --- Datos para graficos ---
  // Diario: ultimos 7 dias
  var dias7=[]; var labels7=[];
  for(var d=6;d>=0;d--){
    var dd=new Date(); dd.setDate(dd.getDate()-d);
    var ds=dd.getFullYear()+'-'+(dd.getMonth()+1<10?'0':'')+(dd.getMonth()+1)+'-'+(dd.getDate()<10?'0':'')+dd.getDate();
    var lbl=dd.toLocaleDateString('es-PE',{weekday:'short',day:'numeric'});
    labels7.push(lbl);
    dias7.push(ventas.filter(function(v){return v.fecha===ds;}).reduce(function(a,v){return a+(v.cantidad||1);},0));
  }
  // Semanal: ultimas 8 semanas
  var semanas8=[]; var labelsS=[];
  for(var w=7;w>=0;w--){
    var wStart=new Date(); wStart.setDate(wStart.getDate()-wStart.getDay()-w*7);
    var wEnd=new Date(wStart); wEnd.setDate(wStart.getDate()+6);

  // Mensual: ultimos 6 meses

  var html='';

  html+='<button id="rt-sem" onclick="switchReporte(\'sem\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;font-size:13px">Semanal</button>';
  html+='<button id="rt-mes" onclick="switchReporte(\'mes\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;font-size:13px">Mensual</button>';
  html+='</div>';

  html+='</div>';
  html+='<div class="card" id="resumen-periodo"><div class="sl">Resumen del periodo</div><div class="empty">Cargando...</div></div>';

  // Filtros y lista

  });
  html+='</div><div class="field"><label>Por fecha</label><input type="date" value="'+filterDate+'" onchange="setFilterDate(this.value)" style="max-width:200px"></div></div>';
  html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">';
  html+='<div class="sl" style="margin:0">'+filtradas.length+' ventas</div>';

  html+='<div style="display:flex;gap:10px;margin-bottom:12px">';
  html+='<div style="flex:1;background:#f5f0ff;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#7b2fff;text-transform:uppercase;letter-spacing:1px">Yape</div><div style="font-size:16px;font-weight:600;color:#7b2fff">'+fmt(totalYape)+'</div></div>';
  html+='<div style="flex:1;background:#f0faf5;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#0F6E56;text-transform:uppercase;letter-spacing:1px">Efectivo</div><div style="font-size:16px;font-weight:600;color:#0F6E56">'+fmt(totalEfectivo)+'</div></div>';
  html+='</div>';

  else{
    filtradas.forEach(function(v,idx){

      html+='<div class="rm">'+fmtDate(v.fecha)+' '+v.hora+' - '+v.cantidad+' x '+fmt(v.precioUnit)+(v.obs?' - '+v.obs:'');

      html+='</div></div>';
      html+='<div style="display:flex;align-items:center;gap:6px"><div class="ra">'+fmt(v.total)+'</div>';
      if(!currentUser||currentUser.rol!=='cajero'){html+='<button class="btnd" onclick="eliminarVenta(\''+v.id+'\')">x</button>';}
      html+='</div></div>';
    });

      html+='<button onclick="toggleExtras(this)" style="width:100%;margin:8px 0;padding:8px;border:0.5px solid #ddd;border-radius:8px;background:#f9f5ef;color:#555;font-size:13px;cursor:pointer">Ver todas ('+filtradas.length+') ▼</button>';

    gDia7.push(gastos.filter(function(g){return g.fecha===ds2;}).reduce(function(a,g){return a+g.monto;},0));

    var ws2=wS2.getFullYear()+'-'+(wS2.getMonth()+1<10?'0':'')+(wS2.getMonth()+1)+'-'+(wS2.getDate()<10?'0':'')+wS2.getDate();var we2=wE2.getFullYear()+'-'+(wE2.getMonth()+1<10?'0':'')+(wE2.getMonth()+1)+'-'+(wE2.getDate()<10?'0':'')+wE2.getDate();
    gSem8.push(gastos.filter(function(g){return g.fecha>=ws2&&g.fecha<=we2;}).reduce(function(a,g){return a+g.monto;},0));

}

function switchReporte(tipo){
  ['dia','sem','mes'].forEach(function(t){
    var btn=document.getElementById('rt-'+t);
    if(!btn)return;
    if(t===tipo){btn.style.background='#8b0000';btn.style.color='#fff';btn.style.borderColor='#8b0000';}
    else{btn.style.background='#fff';btn.style.color='#555';btn.style.borderColor='#ddd';}
  });
  var src=tipo==='dia'?window._rDia:tipo==='sem'?window._rSem:window._rMes;
  var srcG=tipo==='dia'?window._gDia:tipo==='sem'?window._gSem:window._gMes;
  var ctx=document.getElementById('ventasChart');
  if(!ctx)return;
  if(window._chartInst){window._chartInst.destroy();}
  window._chartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:src.labels,
      datasets:[
        {label:'Productos vendidos',data:src.data,backgroundColor:'rgba(139,0,0,0.75)',borderColor:'#8b0000',borderWidth:1,borderRadius:5},
        {label:'Gastos S/',data:srcG,backgroundColor:'rgba(163,45,45,0.35)',borderColor:'#A32D2D',borderWidth:1,borderRadius:5}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top'},tooltip:{callbacks:{label:function(c){var isGasto=c.dataset.label.indexOf('Gasto')>=0;return isGasto?'Gastos: S/ '+c.parsed.y.toFixed(2):c.dataset.label+': '+c.parsed.y+' unidades';}}}},
      scales:{y:{beginAtZero:true,ticks:{callback:function(v){return v+' u';}}}}
    }
  });
  renderResumenPeriodo(tipo);
}

function renderResumenPeriodo(tipo){
  var el=document.getElementById('resumen-periodo');
  if(!el)return;
  var now=new Date();
  var ventasPeriodo=[];var gastosPeriodo=[];
  if(tipo==='dia'){
    var hoyStr=today();
    ventasPeriodo=ventas.filter(function(v){return v.fecha===hoyStr;});
    gastosPeriodo=gastos.filter(function(g){return g.fecha===hoyStr;});
  } else if(tipo==='sem'){
    var wStart=new Date();wStart.setDate(wStart.getDate()-wStart.getDay());
    var wStartStr=wStart.getFullYear()+'-'+(wStart.getMonth()+1<10?'0':'')+(wStart.getMonth()+1)+'-'+(wStart.getDate()<10?'0':'')+wStart.getDate();
    ventasPeriodo=ventas.filter(function(v){return v.fecha>=wStartStr&&v.fecha<=today();});
    gastosPeriodo=gastos.filter(function(g){return g.fecha>=wStartStr&&g.fecha<=today();});
  } else {
    var mesStr=today().slice(0,7);
    ventasPeriodo=ventas.filter(function(v){return v.fecha.slice(0,7)===mesStr;});
    gastosPeriodo=gastos.filter(function(g){return g.fecha.slice(0,7)===mesStr;});
  }

  // Agrupar productos
  var prods={};
  ventasPeriodo.forEach(function(v){
    if(!prods[v.producto]){prods[v.producto]={cant:0,total:0,yape:0,efectivo:0};}
    prods[v.producto].cant+=v.cantidad||1;
    prods[v.producto].total+=v.total;
    if(v.pago==='yape'){prods[v.producto].yape+=v.total;}
    else{prods[v.producto].efectivo+=v.total;}
  });

  var totalVentas=ventasPeriodo.reduce(function(a,v){return a+v.total;},0);
  var totalYape=ventasPeriodo.filter(function(v){return v.pago==='yape';}).reduce(function(a,v){return a+v.total;},0);
  var totalEfectivo=ventasPeriodo.filter(function(v){return v.pago!=='yape';}).reduce(function(a,v){return a+v.total;},0);
  var totalGastos=gastosPeriodo.reduce(function(a,g){return a+g.monto;},0);

  var html='<div class="sl">Resumen '+{dia:'de hoy',sem:'de esta semana',mes:'de este mes'}[tipo]+'</div>';

  // Productos vendidos
  html+='<div style="margin-bottom:12px">';
  html+='<div style="font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Productos vendidos</div>';
  if(Object.keys(prods).length===0){html+='<div class="empty">Sin ventas</div>';}
  else{
    var prodKeys=Object.keys(prods).sort(function(a,b){return prods[b].cant-prods[a].cant;});
    var showAll=false;
    prodKeys.forEach(function(nom,idx){
      var p=prods[nom];
      var prodHidden=idx>=5;
      html+='<div '+(prodHidden?'class="prod-extra" ':'')+'style="display:'+(prodHidden?'none':'flex')+';justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #f0ede8">';
      html+='<div><div style="font-size:14px">'+nom+'</div>';
      html+='<div style="font-size:11px;color:#aaa"><span style="color:#7b2fff">Yape '+fmt(p.yape)+'</span> · <span style="color:#0F6E56">Ef. '+fmt(p.efectivo)+'</span></div></div>';
      html+='<div style="text-align:right"><div style="font-size:15px;font-weight:600;color:#8b0000">x'+p.cant+'</div>';
      html+='<div style="font-size:12px;color:#555">'+fmt(p.total)+'</div></div>';
      html+='</div>';
    });
    if(prodKeys.length>5){
      html+='<button onclick="toggleExtras(this)" style="width:100%;margin-top:6px;padding:6px;border:0.5px solid #ddd;border-radius:8px;background:#f9f5ef;color:#555;font-size:13px;cursor:pointer">Ver todos ('+prodKeys.length+') ▼</button>';
    }
  }
  html+='</div>';

  // Totales Yape / Efectivo
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  html+='<div style="background:#f5f0ff;border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;color:#7b2fff;text-transform:uppercase">Yape</div><div style="font-size:16px;color:#7b2fff">'+fmt(totalYape)+'</div></div>';
  html+='<div style="background:#f0faf5;border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;color:#0F6E56;text-transform:uppercase">Efectivo</div><div style="font-size:16px;color:#0F6E56">'+fmt(totalEfectivo)+'</div></div>';
  html+='</div>';

  // Gastos
  html+='<div style="font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Gastos</div>';
  if(gastosPeriodo.length===0){html+='<div class="empty" style="margin-bottom:8px">Sin gastos</div>';}
  else{
    gastosPeriodo.forEach(function(g,idx){
      var gastoHidden=idx>=5;
      html+='<div '+(gastoHidden?'class="gasto-extra" ':'')+'style="display:'+(gastoHidden?'none':'flex')+';justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #f0ede8;font-size:13px">';
      html+='<span>'+g.descripcion+'</span>';
      html+='<span style="color:#A32D2D">-'+fmt(g.monto)+'</span></div>';
    });
    if(gastosPeriodo.length>5){
      html+='<button onclick="toggleExtras(this)" style="width:100%;margin-top:4px;padding:6px;border:0.5px solid #ddd;border-radius:8px;background:#f9f5ef;color:#555;font-size:13px;cursor:pointer">Ver todos ('+gastosPeriodo.length+') ▼</button>';
    }
    html+='<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:14px;font-weight:600">';
    html+='<span>Total gastos</span><span style="color:#A32D2D">-'+fmt(totalGastos)+'</span></div>';
  }

  // Saldo
  html+='<div style="background:'+(totalVentas-totalGastos>=0?'#f0faf5':'#fff5f5')+';border-radius:8px;padding:10px;text-align:center;margin-top:4px">';
  html+='<div style="font-size:12px;color:#555">Saldo (Ventas - Gastos)</div>';
  html+='<div style="font-size:22px;color:'+(totalVentas-totalGastos>=0?'#0F6E56':'#A32D2D')+'">'+fmt(totalVentas-totalGastos)+'</div></div>';

  el.innerHTML=html;
}

function renderPersonalList(){
  var html='<div class="card"><div class="sl">Personal</div>';
  if(personal.length===0){html+='<div class="empty">Sin empleados registrados</div>';}
  else{personal.forEach(function(p){
    var mes=getMes();
    // Ultimo pago
    var pagosEmpL=pagos.filter(function(a){return a.personalId===p.id;});
    pagosEmpL.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
    var ultimoPagoL=pagosEmpL.length?pagosEmpL[0].fecha:null;
    // Asistencias desde ultimo pago
    var asisEmpL=asistencias.filter(function(a){return a.personalId===p.id&&(!ultimoPagoL||a.fecha>ultimoPagoL);});
    var sueldoDia=p.sueldoDia||p.sueldo||0;
    var histSL=(p.historialSueldos||[]).slice().sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
    function getSueldoDiaL(fecha){
      var s=sueldoDia;
      for(var i=histSL.length-1;i>=0;i--){if(histSL[i].fecha<=fecha){s=histSL[i].monto;break;}}
      return s;
    }
    var diasTL=[];asisEmpL.forEach(function(a){if((a.estado==='asistio'||a.estado==='medio tiempo'||a.estado==='descanso pagado')&&diasTL.indexOf(a.fecha)<0)diasTL.push(a.fecha);});
    var ganadoL=0;
    diasTL.forEach(function(f){
      var s=getSueldoDiaL(f);
      var esMedioL=asisEmpL.some(function(a){return a.fecha===f&&a.estado==='medio tiempo';});
      if(esMedioL){var rmL=asisEmpL.find(function(a){return a.fecha===f&&a.estado==='medio tiempo';});ganadoL+=(rmL&&rmL.montoFijo!=null)?rmL.montoFijo:s*((rmL&&rmL.porcentaje||50)/100);}else{ganadoL+=s;}
    });
    var totalAd=adelantos.filter(function(a){return a.personalId===p.id&&!a.liquidado&&(!ultimoPagoL||a.fecha>ultimoPagoL)}).reduce(function(a,x){return a+x.monto},0);
    var saldo=ganadoL-totalAd;

    html+='<div class="emp-avatar">'+initials(p.nombre)+'</div>';
    html+='<div style="flex:1"><div class="rn">'+p.nombre+'</div>';
    html+='<div class="rm">'+p.cargo+' · <span style="color:'+dotColor+'">'+estadoLabel+'</span></div></div>';
    html+='<div style="text-align:right">';
    html+='<div style="font-size:11px;color:#aaa">'+fmt(sueldoDia)+'/día · '+diasTL.length+'d</div>';
    html+='<div style="font-size:15px;font-weight:700;color:'+(saldo<0?'#cc3333':'#0F6E56')+'">'+fmt(saldo)+'</div>';
    html+='<div style="font-size:10px;color:#aaa">ganado - adelantos</div></div></div>';
    // Botones de asistencia directa
    html+='<div style="display:flex;gap:6px">';

  html+='<button class="btn" onclick="agregarPersonal()">Agregar empleado</button></div>';

function renderSubAsistencia(emp,mes){
  // Ultimo pago registrado
  var pagosEmp=pagos.filter(function(p){return p.personalId===emp.id;});
  pagosEmp.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  var ultimoPago=pagosEmp.length?pagosEmp[0].fecha:null;

  // TODAS las asistencias del empleado (sin filtro de mes)
  var todaAsis=asistencias.filter(function(a){return a.personalId===emp.id;});

  // Solo desde el ultimo pago para conteo
  var asisDesde=ultimoPago?todaAsis.filter(function(a){return a.fecha>ultimoPago;}):todaAsis;

  // Dias unicos trabajados/faltas DESDE ultimo pago
  var diasT=[];asisDesde.forEach(function(a){if((a.estado==='asistio'||a.estado==='medio tiempo'||a.estado==='descanso pagado')&&diasT.indexOf(a.fecha)<0)diasT.push(a.fecha);});
  var diasF=[];asisDesde.forEach(function(a){if(a.estado==='no asistio'&&diasF.indexOf(a.fecha)<0)diasF.push(a.fecha);});
  var diasMed=asisDesde.filter(function(a){return a.estado==='medio tiempo';}).length;

  // Rango de fechas para el calendario: desde fecha inicio (ultimo pago o primera asistencia) hasta hoy
  var todasSortedA=todaAsis.slice().sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
  var primeraAsisA=todasSortedA.length?todasSortedA[0].fecha:today();
  var fechaInicio=ultimoPago&&ultimoPago<primeraAsisA?ultimoPago:primeraAsisA;
  if(!ultimoPago&&!todaAsis.length)fechaInicio=today();
  var dInicio=new Date(fechaInicio+'T00:00:00');
  var dHoy=new Date(today()+'T00:00:00');

  var html='<div class="card"><div class="sl">Asistencia</div>';
  if(ultimoPago){
    html+='<div style="background:#f0faf5;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:13px;color:#0F6E56">Periodo desde: <strong>'+fmtDate(ultimoPago)+'</strong> hasta hoy</div>';
  } else {
    html+='<div style="background:#f9f5ef;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:13px;color:#888">Mostrando todas las asistencias registradas</div>';
  }
  html+='<div style="font-size:12px;color:#aaa;margin-bottom:10px">Toca un dia para marcar asistencia</div>';
  html+='</div>';

  // CALENDARIO CONTINUO — mes a mes desde inicio hasta hoy
  var dCursor=new Date(dInicio.getFullYear(), dInicio.getMonth(), 1);
  var dFin=new Date(dHoy.getFullYear(), dHoy.getMonth(), 1);
  var days=['D','L','M','M','J','V','S'];

  while(dCursor<=dFin){
    var calYear=dCursor.getFullYear();
    var calMonth=dCursor.getMonth();
    var monthLabel=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][calMonth]+' '+calYear;
    var firstDay=new Date(calYear,calMonth,1).getDay();
    var daysInMonth=new Date(calYear,calMonth+1,0).getDate();

    html+='<div class="card" style="padding:12px">';
    html+='<div style="font-size:13px;font-weight:600;color:#8b0000;margin-bottom:8px">'+monthLabel+'</div>';
    html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">';
    days.forEach(function(d){html+='<div style="text-align:center;font-size:10px;color:#aaa;font-weight:600">'+d+'</div>';});
    html+='</div>';
    html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
    for(var i=0;i<firstDay;i++){html+='<div></div>';}
    for(var d=1;d<=daysInMonth;d++){
      var ds=calYear+'-'+(calMonth+1<10?'0':'')+(calMonth+1)+'-'+(d<10?'0':'')+d;
      var antesDelPago=ultimoPago&&ds<=ultimoPago;
      var antesDelInicio=ds<fechaInicio;
      var regsDs=todaAsis.filter(function(a){return a.fecha===ds;});
      var ultDs=regsDs.length?regsDs[regsDs.length-1]:null;
      var isT=ultDs&&(ultDs.estado==='asistio');
      var isDes=ultDs&&ultDs.estado==='descanso pagado';
      var isMed=ultDs&&ultDs.estado==='medio tiempo';
      var isF=ultDs&&ultDs.estado==='no asistio';
      var isToday=ds===today();
      var futura=ds>today();
      var bg=(antesDelPago||antesDelInicio)?(isT||isDes?'#2d6a4f':isMed?'#52b788':isF?'#95d5b2':'#e8e4de'):futura?'#f9f7f4':isT?'#185FA5':isDes?'#7b2fff':isMed?'#854F0B':isF?'#A32D2D':'#f0ede8';
      var color=(antesDelPago||antesDelInicio)?(isT||isDes||isMed||isF?'#fff':'#ccc'):futura?'#ccc':(isT||isDes||isMed||isF)?'#fff':'#888';
      var border=isToday?'2px solid #8b0000':'2px solid transparent';
      var clickable=!antesDelPago&&!futura;
      var dataAttrs=clickable?' data-empid="'+emp.id+'" data-empnombre="'+emp.nombre+'" data-fecha="'+ds+'" onclick="abrirModalAsisDt(this)"':'';
      var cursor=clickable?'cursor:pointer':'cursor:default';
      var labelDsAdmin=ultDs?(ultDs.estado==='asistio'?'✅ Asistió':ultDs.estado==='descanso pagado'?'🏖️ Descanso pagado':ultDs.estado==='medio tiempo'?'🟡 Medio tiempo':ultDs.estado==='no asistio'?'❌ No asistió':''):'Sin registro';
      var titleDsAdmin=((antesDelPago||antesDelInicio)?'[Cancelado] ':'')+labelDsAdmin;
      html+='<div'+dataAttrs+' title="'+titleDsAdmin+'" style="'+cursor+';text-align:center;padding:5px 2px;border-radius:6px;background:'+bg+';color:'+color+';font-size:12px;border:'+border+'">'+d+'</div>';
    }
    html+='</div></div>';
    dCursor.setMonth(dCursor.getMonth()+1);
  }

  // Leyenda y conteos
  html+='<div class="card">';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#185FA5"></div><span style="font-size:11px;color:#555">Trabajó</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#7b2fff"></div><span style="font-size:11px;color:#555">Descanso pagado</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#854F0B"></div><span style="font-size:11px;color:#555">Medio tiempo</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#A32D2D"></div><span style="font-size:11px;color:#555">Faltó</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#f0ede8;border:1px solid #ddd"></div><span style="font-size:11px;color:#555">Sin registrar</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#e8e4de"></div><span style="font-size:11px;color:#555">Ya pagado</span></div>';
  html+='</div>';
  var diasDescanso=asisDesde.filter(function(a){return a.estado==='descanso pagado';}).length;
  var diasCompletosT=diasT.filter(function(f){return !asisDesde.some(function(a){return a.fecha===f&&(a.estado==='medio tiempo'||a.estado==='descanso pagado');});}).length;
  html+='<div class="row"><div class="rn">Días completos trabajados</div><div class="ra">'+diasCompletosT+'</div></div>';
  if(diasDescanso>0){html+='<div class="row"><div class="rn">Descanso pagado</div><div style="font-size:14px;font-weight:600;color:#7b2fff">'+diasDescanso+'</div></div>';}
  if(diasMed>0){html+='<div class="row"><div class="rn">Medio tiempo</div><div style="font-size:14px;font-weight:600;color:#854F0B">'+diasMed+'</div></div>';}
  html+='<div class="row"><div class="rn">Faltas</div><div style="font-size:14px;font-weight:600;color:'+(diasF.length>0?'#A32D2D':'#888')+'">'+diasF.length+'</div></div>';
  html+='</div>';
  return html;
}
