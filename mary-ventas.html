<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mary — Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-weight:600!important}
body{font-family:'Source Sans 3',sans-serif;background:#fdf8f0;color:#1a1a1a;min-height:100vh;font-size:16px;font-weight:600}
#loader{position:fixed;inset:0;background:#fdf8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.loader-logo{font-family:'Playfair Display',serif;font-size:38px;color:#8b0000;letter-spacing:5px}
.loader-sub{font-size:11px;letter-spacing:4px;color:#bbb;text-transform:uppercase}
.loader-dot{display:flex;gap:7px;margin-top:4px}
.loader-dot span{width:7px;height:7px;border-radius:50%;background:#c8a96e;animation:bounce 1s infinite}
.loader-dot span:nth-child(2){animation-delay:.15s}
.loader-dot span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-9px)}}

@media print {
  #loader,nav,.nav,button,.btnd,.lbtn,#login-screen,.metrics{display:none!important}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  body{background:#fff!important;font-size:12px}
  .print-header{display:block!important}
}
.print-header{display:none}

/* LOGIN */
#login-screen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:2rem}
.login-box{background:#fff;border:1px solid #ede4d4;border-radius:16px;padding:2rem;width:100%;max-width:380px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.login-logo{font-family:'Playfair Display',serif;font-size:36px;color:#8b0000;letter-spacing:5px;text-align:center}
.login-sub{font-size:10px;letter-spacing:4px;color:#aaa;text-transform:uppercase;text-align:center;margin-top:3px}
.login-divider{width:40px;height:1.5px;background:#c8a96e;margin:12px auto 24px}
.login-tabs{display:flex;border-bottom:1px solid #ede4d4;margin-bottom:20px}
.ltab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:9px;font-size:13px;cursor:pointer;color:#aaa;font-family:'Source Sans 3',sans-serif;margin-bottom:-1px}
.ltab.on{color:#8b0000;border-bottom-color:#8b0000;font-weight:600}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:11px;color:#aaa;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.lfield input,.lfield select{width:100%;border:1px solid #e0d5c5;border-radius:8px;padding:12px 14px;font-size:16px;font-family:'Source Sans 3',sans-serif;color:#1a1a1a;background:#fff}
.lfield input:focus,.lfield select:focus{outline:none;border-color:#8b0000}
.lbtn{background:#8b0000;color:#fff;border:none;border-radius:8px;padding:14px;font-size:16px;cursor:pointer;width:100%;font-family:'Source Sans 3',sans-serif;font-weight:600;margin-top:4px}
.lbtn:hover{background:#6b0000}
.lerror{color:#cc3333;font-size:12px;text-align:center;margin-top:8px;min-height:18px}
/* APP */
#app{display:none;max-width:600px;margin:0 auto;padding:0 0 60px}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 1rem 0}
.header{text-align:center;padding:16px 0 6px}
.logo{font-family:'Playfair Display',serif;font-size:32px;color:#8b0000;letter-spacing:5px}
.sub{font-size:10px;letter-spacing:4px;color:#aaa;text-transform:uppercase;margin-top:2px}
.divider{width:50px;height:1.5px;background:#c8a96e;margin:8px auto}
.user-badge{font-size:11px;color:#888;background:#f5ede0;padding:4px 10px;border-radius:20px}
.logout-btn{background:none;border:1px solid #e0d5c5;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:#888;font-family:'Source Sans 3',sans-serif}
.logout-btn:hover{background:#f5ede0}
.nav{display:flex;border-bottom:1px solid #ede4d4;margin:0 1rem;overflow-x:auto}
.nb{background:none;border:none;border-bottom:2px solid transparent;padding:10px 12px;font-size:14px;cursor:pointer;color:#aaa;margin-bottom:-1px;font-family:'Source Sans 3',sans-serif;white-space:nowrap}
.nb.on{color:#8b0000;border-bottom-color:#8b0000;font-weight:600}
.card{background:#fff;border:1px solid #ede4d4;border-radius:12px;padding:16px;margin:1rem;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.sl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8b0000;margin-bottom:14px;font-weight:600}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:1rem}
.met{background:#fff;border:1px solid #ede4d4;border-radius:10px;padding:10px 6px;text-align:center}
.ml{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.5px}
.mv{font-size:19px;font-weight:600;color:#1a1a1a;margin-top:2px}
.mv.g{color:#0F6E56}.mv.r{color:#8b0000}.mv.sm{font-size:12px;margin-top:4px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#aaa;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;border:1px solid #e0d5c5;border-radius:8px;padding:10px 12px;font-size:16px;font-family:'Source Sans 3',sans-serif;color:#1a1a1a;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:#8b0000}
.total-field{color:#0F6E56!important;font-weight:600!important;background:#f0faf5!important}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn{background:#8b0000;color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;cursor:pointer;width:100%;font-family:'Source Sans 3',sans-serif;font-weight:600;margin-top:4px}
.btn:hover{background:#6b0000}
.btn-g{background:#0F6E56}.btn-g:hover{background:#0a5040}
.btn-o{background:#854F0B}.btn-o:hover{background:#6a3e08}
.btnd{background:none;border:none;color:#cc3333;font-size:12px;cursor:pointer;padding:3px 6px;border-radius:4px}
.fb{background:none;border:1px solid #e0d5c5;border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;color:#888;font-family:'Source Sans 3',sans-serif}
.fb.on{background:#8b0000;color:#fff;border-color:#8b0000}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:.5px solid #f0e8d8}
.row:last-child{border-bottom:none}
.rn{font-size:16px;font-weight:500;color:#1a1a1a}
.rm{font-size:13px;color:#bbb;margin-top:2px}
.ra{font-size:16px;font-weight:600;color:#0F6E56}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-left:5px;vertical-align:middle}
.bd{background:#EAF3DE;color:#3B6D11}.ba{background:#E6F1FB;color:#185FA5}
.bc{background:#FAEEDA;color:#854F0B}.bo{background:#F1EFE8;color:#5F5E5A}
.bp{background:#FBEAF0;color:#993556}.br{background:#FCEBEB;color:#A32D2D}
.empty{text-align:center;padding:1.5rem;color:#ccc;font-size:13px}
.bar-row{margin-bottom:10px}
.bar-label{font-size:12px;color:#aaa;margin-bottom:3px;display:flex;justify-content:space-between}
.bar-bg{height:14px;background:#f5ede0;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:#8b0000;border-radius:4px}
.prod-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid #f0e8d8}
.prod-row:last-child{border-bottom:none}
.inp-sm{width:85px;border:1px solid #e0d5c5;border-radius:6px;padding:5px 8px;font-size:13px;font-family:'Source Sans 3',sans-serif;color:#1a1a1a;text-align:center}
.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f4a1f;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-in{background:#3B6D11}.dot-out{background:#854F0B}.dot-abs{background:#A32D2D}.dot-none{background:#ccc}
.back-btn{background:none;border:none;color:#8b0000;font-size:13px;cursor:pointer;font-family:'Source Sans 3',sans-serif;padding:0;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.sub-nav{display:flex;gap:0;border-bottom:1px solid #ede4d4;margin:0 1rem}
.snb{background:none;border:none;border-bottom:2px solid transparent;padding:9px 12px;font-size:13px;cursor:pointer;color:#aaa;margin-bottom:-1px;font-family:'Source Sans 3',sans-serif;white-space:nowrap}
.snb.on{color:#8b0000;border-bottom-color:#8b0000;font-weight:600}
.emp-avatar{width:44px;height:44px;border-radius:50%;background:#f5ede0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#8b0000;flex-shrink:0}
.resumen-box{background:#f9f5ef;border-radius:10px;padding:14px;margin-bottom:10px}
.resumen-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:15px}
.resumen-row.total{font-weight:600;font-size:17px;border-top:1px solid #e0d5c5;margin-top:6px;padding-top:10px}
.asis-btns{display:flex;gap:6px;margin-top:8px}
.asis-btn{flex:1;border:none;border-radius:8px;padding:11px;font-size:14px;font-family:'Source Sans 3',sans-serif;font-weight:600;cursor:pointer}
.ab-in{background:#EAF3DE;color:#3B6D11}.ab-out{background:#FCEBEB;color:#A32D2D}.ab-abs{background:#E6F1FB;color:#185FA5}
.tag-ef{background:#E6F1FB;color:#185FA5;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}
.tag-pr{background:#FBEAF0;color:#993556;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}
.tag-pa{background:#EAF3DE;color:#3B6D11;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}
.readonly-note{background:#fff8e8;border:1px solid #f0d890;border-radius:8px;padding:10px 14px;font-size:12px;color:#854F0B;margin:0 1rem 0}
/* Vista empleado */
.emp-view{max-width:600px;margin:0 auto;padding:0 0 60px}
.emp-profile-header{text-align:center;padding:24px 1rem 16px}
.emp-profile-avatar{width:70px;height:70px;border-radius:50%;background:#f5ede0;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600;color:#8b0000;margin:0 auto 10px}
.emp-profile-name{font-size:20px;font-weight:600;color:#1a1a1a}
.emp-profile-cargo{font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
@media(max-width:420px){.metrics{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">Mary</div>
  <div class="loader-sub">Cargando...</div>
  <div class="loader-dot"><span></span><span></span><span></span></div>
</div>

<!-- LOGIN -->
<div id="login-screen" style="display:none;min-height:100vh;display:none;align-items:center;justify-content:center;padding:2rem">
  <div class="login-box">
    <div class="login-logo">Mary</div>
    <div class="login-sub">Sistema de Gestion</div>
    <div class="login-divider"></div>
    <div class="login-tabs">
      <button class="ltab on" onclick="switchLoginTab('admin')">Administrador</button>
      <button class="ltab" onclick="switchLoginTab('empleado')">Empleado</button>
      <button class="ltab" onclick="switchLoginTab('cajero')">Cajero</button>
    </div>
    <!-- Admin login -->
    <div id="login-admin">
      <div class="lfield"><label>Correo electronico</label><input type="email" id="admin-email" placeholder="tu@correo.com"></div>
      <div class="lfield"><label>Contrasena</label><input type="password" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')loginAdmin()"></div>
      <button class="lbtn" onclick="loginAdmin()">Ingresar como Admin</button>
    </div>
    <!-- Empleado login -->
    <div id="login-empleado" style="display:none">
      <div class="lfield"><label>Selecciona tu nombre</label>
        <select id="emp-select"><option value="">-- Elige tu nombre --</option></select>
      </div>
      <div class="lfield"><label>Tu PIN</label><input type="password" id="emp-pin" placeholder="••••" maxlength="6" onkeydown="if(event.key==='Enter')loginEmpleado()"></div>
      <button class="lbtn" onclick="loginEmpleado()">Ingresar</button>
    </div>
    <!-- Cajero login -->
    <div id="login-cajero" style="display:none">
      <div class="lfield"><label>Selecciona tu nombre</label>
        <select id="cajero-select"><option value="">-- Elige tu nombre --</option></select>
      </div>
      <div class="lfield"><label>Tu PIN</label><input type="password" id="cajero-pin" placeholder="••••" maxlength="6" onkeydown="if(event.key==='Enter')loginCajero()"></div>
      <button class="lbtn" onclick="loginCajero()">Ingresar como Cajero</button>
    </div>
    <div class="lerror" id="login-error"></div>
  </div>
</div>

<!-- APP ADMIN -->
<div id="app">
  <div class="top-bar">
    <span class="user-badge" id="user-badge">Admin</span>
    <button class="logout-btn" onclick="logout()">Cerrar sesion</button>
  </div>
  <div class="header">
    <div class="logo">Mary</div>
    <div class="sub">Sistema de Gestion</div>
    <div class="divider"></div>
  </div>
  <nav class="nav">
    <button class="nb on" onclick="showTab('dashboard')">Resumen</button>
    <button class="nb" onclick="showTab('nueva')">+ Venta</button>
    <button class="nb" onclick="showTab('historial')">Historial</button>
    <button class="nb" onclick="showTab('personal')">Personal</button>
    <button class="nb" onclick="showTab('productos')">Productos</button>
  </nav>
  <div id="dashboard"></div>
  <div id="nueva" style="display:none"></div>
  <div id="historial" style="display:none"></div>
  <div id="personal" style="display:none"></div>
  <div id="productos" style="display:none"></div>
  <div id="gastos" style="display:none"></div>
</div>

<!-- VISTA EMPLEADO -->
<div id="emp-app" style="display:none">
  <div class="top-bar">
    <span class="user-badge" id="emp-badge">Empleado</span>
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>
  <div id="emp-content"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyCQIboNV2qf6Wcc1DIaI7WN4T6rUh1UyJg",
  authDomain: "mary-restaurante.firebaseapp.com",
  databaseURL: "https://mary-restaurante-default-rtdb.firebaseio.com",
  projectId: "mary-restaurante",
  storageBucket: "mary-restaurante.firebasestorage.app",
  messagingSenderId: "499224458217",
  appId: "1:499224458217:web:80c08c756631359e575178"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.database();

var currentUser = null; // { rol: 'admin'|'empleado', personalId, nombre }
var ventas=[],productos=[],personal=[],asistencias=[],adelantos=[],pagos=[],cajaAperturas=[],gastos=[];
var activeTab='dashboard',filterTurno='todos',filterDate='';
var selectedEmpId=null,selectedEmpSubTab='asistencia';
var filterAsisDate='',filterMes='';
var loginTab='admin';

var defaultProductos=[
  {nombre:'Pollo a la brasa',precio:18,turno:'almuerzo'},
  {nombre:'Desayuno completo',precio:8,turno:'desayuno'},
  {nombre:'Menu almuerzo',precio:10,turno:'almuerzo'},
  {nombre:'Menu cena',precio:10,turno:'cena'},
  {nombre:'Porcion de pollo',precio:12,turno:'almuerzo'}
];

function today(){return new Date().toISOString().split('T')[0]}
function mesActual(){return today().slice(0,7)}
function fmtDate(d){var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function fmt(n){return'S/ '+parseFloat(n).toFixed(2)}
function turnoClass(t){return t==='desayuno'?'bd':t==='almuerzo'?'ba':t==='cena'?'bc':'bo'}
function turnoLabel(t){return t.charAt(0).toUpperCase()+t.slice(1)}
function nowTime(){var n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')}
function initials(n){var p=n.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase()}
function getMes(){return filterMes||mesActual()}

function showToast(msg,error){
  var el=document.getElementById('toast');
  el.textContent=msg;el.style.background=error?'#7a1f1f':'#1f4a1f';
  el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2500);
}

// ── AUTH ─────────────────────────────────────────────────────
auth.onAuthStateChanged(function(user){
  if(user){
    // Admin autenticado
    currentUser={rol:'admin',nombre:'Admin'};
    startListeners();
    showAdminApp();
  } else {
    // No autenticado — mostrar login
    document.getElementById('loader').style.display='none';
    showLoginScreen();
  }
});

function showLoginScreen(){
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='none';
  document.getElementById('emp-app').style.display='none';
  var ls=document.getElementById('login-screen');
  var csel=document.getElementById('cajero-select');
  if(csel){csel.innerHTML='<option value="">-- Elige tu nombre --</option>';personal.forEach(function(p){csel.innerHTML+='<option value="'+p.id+'">'+p.nombre+'</option>';});}
  ls.style.display='flex';ls.style.flexDirection='column';ls.style.alignItems='center';ls.style.justifyContent='center';
  // Poblar select de empleados
  var sel=document.getElementById('emp-select');
  sel.innerHTML='<option value="">-- Elige tu nombre --</option>';
  personal.forEach(function(p){
    if(p.pin){sel.innerHTML+='<option value="'+p.id+'">'+p.nombre+'</option>';}
  });
}

function switchLoginTab(tab){
  loginTab=tab;
  document.querySelectorAll('.ltab').forEach(function(b,i){b.classList.toggle('on',['admin','empleado','cajero'][i]===tab);});
  document.getElementById('login-admin').style.display=tab==='admin'?'block':'none';
  document.getElementById('login-empleado').style.display=tab==='empleado'?'block':'none';
  document.getElementById('login-cajero').style.display=tab==='cajero'?'block':'none';
  document.getElementById('login-error').textContent='';
  if(tab==='cajero'){
    var csel=document.getElementById('cajero-select');
    csel.innerHTML='<option value="">-- Elige tu nombre --</option>';
    personal.forEach(function(p){csel.innerHTML+='<option value="'+p.id+'">'+p.nombre+'</option>';});
  }
}

function loginAdmin(){
  var email=document.getElementById('admin-email').value.trim();
  var pass=document.getElementById('admin-pass').value;
  if(!email||!pass){document.getElementById('login-error').textContent='Completa todos los campos';return;}
  auth.signInWithEmailAndPassword(email,pass)
    .catch(function(e){
      document.getElementById('login-error').textContent='Correo o contrasena incorrectos';
    });
}

function loginEmpleado(){
  var empId=document.getElementById('emp-select').value;
  var pin=document.getElementById('emp-pin').value;
  if(!empId||!pin){document.getElementById('login-error').textContent='Selecciona tu nombre e ingresa tu PIN';return;}
  var emp=null;for(var i=0;i<personal.length;i++){if(personal[i].id===empId){emp=personal[i];break;}}
  if(!emp||!emp.pin){document.getElementById('login-error').textContent='Empleado no encontrado';return;}
  if(emp.pin.toString()!==pin.toString()){document.getElementById('login-error').textContent='PIN incorrecto';return;}
  currentUser={rol:'empleado',personalId:emp.id,nombre:emp.nombre};
  document.getElementById('login-screen').style.display='none';
  showEmpApp(emp);
}

function loginCajero(){
  var empId=document.getElementById('cajero-select').value;
  var pin=document.getElementById('cajero-pin').value.trim();
  if(!empId||!pin){document.getElementById('login-error').textContent='Selecciona tu nombre e ingresa tu PIN';return;}
  var emp=null;
  for(var i=0;i<personal.length;i++){if(personal[i].id===empId){emp=personal[i];break;}}
  if(!emp||!emp.pin){document.getElementById('login-error').textContent='Empleado no encontrado';return;}
  if(emp.pin.toString()!==pin.toString()){document.getElementById('login-error').textContent='PIN incorrecto';return;}
  currentUser={rol:'cajero',personalId:emp.id,nombre:emp.nombre};
  startListeners();
  document.getElementById('login-screen').style.display='none';
  showCajeroApp();
}

function showCajeroApp(){
  document.getElementById('loader').style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('emp-app').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-badge').textContent='Cajero: '+(currentUser.nombre||'');
  var nav=document.querySelector('.nav');
  nav.innerHTML=[
    '<button class="nb" data-tab="dashboard" onclick="showTab(\'dashboard\')">Resumen</button>',
    '<button class="nb" data-tab="nueva" onclick="showTab(\'nueva\')">+ Venta</button>',
    '<button class="nb" data-tab="gastos" onclick="showTab(\'gastos\')">Gastos</button>'
  ].join('');
  showTab('dashboard');
}

function logout(){
  if(currentUser&&currentUser.rol==='admin'){
    auth.signOut().then(function(){currentUser=null;showLoginScreen();});
  } else {
    currentUser=null;showLoginScreen();
  }
}

function showAdminApp(){

function renderEmpView(empId){
  var emp=null;for(var i=0;i<personal.length;i++){if(personal[i].id===empId){emp=personal[i];break;}}
  if(!emp)return;
  var mes=getMes();
  var adEmp=adelantos.filter(function(a){return a.personalId===empId&&a.fecha.slice(0,7)===mes&&!a.liquidado});
  var paEmp=pagos.filter(function(a){return a.personalId===empId&&a.fecha.slice(0,7)===mes});
  var asisMes=asistencias.filter(function(a){return a.personalId===empId&&a.fecha.slice(0,7)===mes});
  var diasT=[];asisMes.forEach(function(a){if((a.estado==='asistio'||a.estado==='medio tiempo')&&diasT.indexOf(a.fecha)<0)diasT.push(a.fecha);});
  var diasF=[];asisMes.forEach(function(a){if(a.estado==='no asistio'&&diasF.indexOf(a.fecha)<0)diasF.push(a.fecha);});
  var totalAd=adEmp.reduce(function(a,x){return a+x.monto},0);
  var totalPa=paEmp.reduce(function(a,x){return a+x.monto},0);
  var saldo=(emp.sueldo||0)-totalAd-totalPa;

  var html='<div class="emp-view">';
  html+='<div class="emp-profile-header">';
  html+='<div class="emp-profile-avatar">'+initials(emp.nombre)+'</div>';
  html+='<div class="emp-profile-name">'+emp.nombre+'</div>';
  html+='<div class="emp-profile-cargo">'+emp.cargo+'</div></div>';

  html+='<div style="padding:0 1rem"><div class="readonly-note" style="margin:0 0 1rem">Vista de solo lectura — contacta al administrador para cambios</div></div>';

  // Selector de mes
  html+='<div class="card"><div class="sl">Mes</div>';
  html+='<input type="month" value="'+mes+'" onchange="setMesEmp(this.value,\''+empId+'\')" style="border:1px solid #e0d5c5;border-radius:8px;padding:7px 11px;font-size:14px;font-family:inherit;color:#1a1a1a">';
  html+='</div>';

  // Resumen
  html+='<div class="card"><div class="sl">Mi resumen del mes</div>';
  html+='<div class="resumen-box">';
  html+='<div class="resumen-row"><span>Sueldo base</span><span style="color:#0F6E56">'+fmt(emp.sueldo||0)+'</span></div>';
  html+='<div class="resumen-row"><span>Dias trabajados</span><span>'+diasT.length+' dias</span></div>';
  html+='<div class="resumen-row"><span>Faltas</span><span style="color:#A32D2D">'+diasF.length+' dias</span></div>';
  html+='<div class="resumen-row"><span>Total adelantos</span><span style="color:#854F0B">- '+fmt(totalAd)+'</span></div>';
  html+='<div class="resumen-row"><span>Ya pagado</span><span style="color:#0F6E56">- '+fmt(totalPa)+'</span></div>';
  html+='<div class="resumen-row total"><span>Saldo a cobrar</span><span style="color:'+(saldo<0?'#cc3333':'#0F6E56')+'">'+fmt(saldo)+'</span></div>';
  html+='</div></div>';

  // Asistencia
  html+='<div class="card"><div class="sl">Mi asistencia este mes</div>';
  if(asisMes.length===0){html+='<div class="empty">Sin registros este mes</div>';}
  else{
    var histSorted=asisMes.slice().sort(function(a,b){return b.fecha.localeCompare(a.fecha)||b.hora.localeCompare(a.hora)});
    histSorted.forEach(function(r){
      var badge=r.estado==='asistio'?'<span class="badge bd">Asistio</span>':r.estado==='no asistio'?'<span class="badge br">No asistio</span>':'<span class="badge ba">Medio tiempo</span>';
      html+='<div class="row">'+badge+'<span style="font-size:12px;color:#888">'+fmtDate(r.fecha)+' '+r.hora+'</span></div>';
    });
  }
  html+='</div>';

  // Adelantos
  html+='<div class="card"><div class="sl">Mis adelantos este mes</div>';
  if(adEmp.length===0){html+='<div class="empty">Sin adelantos este mes</div>';}
  else{adEmp.forEach(function(a){
    var tag=a.tipo==='efectivo'?'<span class="tag-ef">Efectivo</span>':'<span class="tag-pr">Producto</span>';
    html+='<div class="row"><div>'+tag+'<div class="rn" style="margin-top:3px">'+(a.descripcion||'Adelanto')+'</div>';
    html+='<div class="rm">'+fmtDate(a.fecha)+(a.nota?' · '+a.nota:'')+'</div></div>';
    html+='<div style="font-size:14px;font-weight:600;color:#854F0B">'+fmt(a.monto)+'</div></div>';
  });}
  html+='</div>';

  // Pagos
  html+='<div class="card"><div class="sl">Mis pagos este mes</div>';
  if(paEmp.length===0){html+='<div class="empty">Sin pagos registrados este mes</div>';}
  else{paEmp.forEach(function(p){
    html+='<div class="row"><div><span class="tag-pa">Pago</span><div class="rm" style="margin-top:3px">'+fmtDate(p.fecha)+(p.nota?' · '+p.nota:'')+'</div></div>';
    html+='<div class="ra">'+fmt(p.monto)+'</div></div>';
  });}
  html+='</div>';
  html+='</div>';
  document.getElementById('emp-content').innerHTML=html;
}

function setMesEmp(m,empId){filterMes=m;renderEmpView(empId);}

  });
  db.ref('pagos').on('value',function(snap){

function showTab(name){
  activeTab=name;selectedEmpId=null;
  document.querySelectorAll('.nb').forEach(function(b){
    var dt=b.getAttribute('data-tab');
    if(dt){b.classList.toggle('on',dt===name);}
    else{b.classList.toggle('on',b.getAttribute('onclick')&&b.getAttribute('onclick').indexOf("'"+name+"'")>-1);}
  });
  ['dashboard','nueva','historial','personal','productos','gastos'].forEach(function(t){
    document.getElementById(t).style.display=t===name?'block':'none';
  });
  render();
}
function render(){
  if(!currentUser||(currentUser.rol!=='admin'&&currentUser.rol!=='cajero'))return;
  if(activeTab==='dashboard')renderDashboard();
  else if(activeTab==='nueva')renderNueva();
  else if(activeTab==='historial')renderHistorial();
  else if(activeTab==='personal'){if(selectedEmpId)renderEmpDetail();else renderPersonalList();}
  else if(activeTab==='gastos')renderGastos();
  else if(activeTab==='productos')renderProductos();
}

  html+='<div class="field"><label>Precio (S/)</label><input type="number" id="np-precio" step="0.5" oninput="calcTotal()"></div>';
  html+='<div class="field"><label>Total</label><input type="text" id="np-total" readonly class="total-field"></div></div>';
  html+='<div class="g2"><div class="field"><label>Turno</label><select id="np-turno"><option value="desayuno">Desayuno</option><option value="almuerzo" selected>Almuerzo</option><option value="cena">Cena</option><option value="otro">Otro</option></select></div>';
  html+='<div class="field"><label>Fecha</label><input type="date" id="np-fecha" value="'+today()+'"></div></div>';
  html+='<div class="g2"><div class="field"><label>Metodo de pago</label><select id="np-pago"><option value="efectivo">💵 Efectivo</option><option value="yape">💜 Yape</option></select></div>';
  html+='<div class="field"><label>Observacion</label><input type="text" id="np-obs" placeholder="Ej: para llevar..."></div></div>';
  html+='<button class="btn" onclick="guardarVenta()">Registrar venta</button></div>';
  document.getElementById('nueva').innerHTML=html;actualizarPrecio();
}
function actualizarPrecio(){
  var sel=document.getElementById('np-prod');if(!sel)return;
  var opt=sel.options[sel.selectedIndex];
  document.getElementById('np-precio').value=opt.dataset.precio;
  var t=opt.dataset.turno;
  if(['desayuno','almuerzo','cena'].indexOf(t)>=0)document.getElementById('np-turno').value=t;
  calcTotal();
}
function calcTotal(){
  var cant=parseFloat(document.getElementById('np-cant').value)||0;
  var precio=parseFloat(document.getElementById('np-precio').value)||0;
  var el=document.getElementById('np-total');if(el)el.value=fmt(cant*precio);
}
function guardarVenta(){
  var sel=document.getElementById('np-prod');
  var prod=null;for(var i=0;i<productos.length;i++){if(productos[i].id===sel.value){prod=productos[i];break;}}
  var cant=parseFloat(document.getElementById('np-cant').value)||1;
  var precio=parseFloat(document.getElementById('np-precio').value)||0;
  var turno=document.getElementById('np-turno').value;
  var fecha=document.getElementById('np-fecha').value||today();
  var obs=document.getElementById('np-obs').value;
  var pago=document.getElementById('np-pago')?document.getElementById('np-pago').value:'efectivo';
  if(!prod||cant<=0||precio<=0){showToast('Completa todos los campos',true);return;}
  db.ref('ventas').push({producto:prod.nombre,prodId:prod.id,cantidad:cant,precioUnit:precio,total:cant*precio,turno:turno,fecha:fecha,hora:nowTime(),obs:obs,pago:pago,timestamp:new Date().toISOString()})
    .then(function(){showToast('Venta registrada - '+fmt(cant*precio));showTab('dashboard');});
}
function eliminarVenta(id){
  if(!confirm('Eliminar esta venta?'))return;
  db.ref('ventas/'+id).remove().then(function(){showToast('Venta eliminada');});
}

function renderHistorial(){
  var filtradas=ventas.filter(function(v){
    if(filterTurno!=='todos'&&v.turno!==filterTurno)return false;
    if(filterDate&&v.fecha!==filterDate)return false;return true;
  });
  var totalFiltrado=filtradas.reduce(function(a,v){return a+v.total},0);
  var totalYape=filtradas.filter(function(v){return v.pago==='yape'}).reduce(function(a,v){return a+v.total},0);
  var totalEfectivo=filtradas.filter(function(v){return v.pago!=='yape'}).reduce(function(a,v){return a+v.total},0);

  // --- Datos para graficos ---
  // Diario: ultimos 7 dias
  var dias7=[]; var labels7=[];
  for(var d=6;d>=0;d--){
    var dd=new Date(); dd.setDate(dd.getDate()-d);
    var ds=dd.toISOString().slice(0,10);
    var lbl=dd.toLocaleDateString('es-PE',{weekday:'short',day:'numeric'});
    labels7.push(lbl);
    dias7.push(ventas.filter(function(v){return v.fecha===ds;}).reduce(function(a,v){return a+v.total;},0));
  }
  // Semanal: ultimas 8 semanas
  var semanas8=[]; var labelsS=[];
  for(var w=7;w>=0;w--){
    var wStart=new Date(); wStart.setDate(wStart.getDate()-wStart.getDay()-w*7);
    var wEnd=new Date(wStart); wEnd.setDate(wStart.getDate()+6);
    var ws=wStart.toISOString().slice(0,10); var we=wEnd.toISOString().slice(0,10);
    labelsS.push('S '+(wStart.getDate())+'/'+(wStart.getMonth()+1));
    semanas8.push(ventas.filter(function(v){return v.fecha>=ws&&v.fecha<=we;}).reduce(function(a,v){return a+v.total;},0));
  }
  // Mensual: ultimos 6 meses
  var meses6=[]; var labelsM=[];
  var mnames=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  for(var m=5;m>=0;m--){
    var md=new Date(); md.setDate(1); md.setMonth(md.getMonth()-m);
    var my=md.getFullYear(); var mm=md.getMonth();
    var ms=my+'-'+(mm+1<10?'0':'')+(mm+1);
    labelsM.push(mnames[mm]+' '+String(my).slice(2));
    meses6.push(ventas.filter(function(v){return v.fecha.slice(0,7)===ms;}).reduce(function(a,v){return a+v.total;},0));
  }

  var html='';
  // Tabs de reporte
  html+='<div class="card"><div class="sl">Reportes de ventas</div>';
  html+='<div style="display:flex;gap:6px;margin-bottom:14px">';
  html+='<button id="rt-dia" onclick="switchReporte(\'dia\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid #8b0000;background:#8b0000;color:#fff;cursor:pointer;font-size:13px">Diario</button>';
  html+='<button id="rt-sem" onclick="switchReporte(\'sem\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;font-size:13px">Semanal</button>';
  html+='<button id="rt-mes" onclick="switchReporte(\'mes\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;font-size:13px">Mensual</button>';
  html+='</div>';
  html+='<div style="position:relative;height:220px"><canvas id="ventasChart"></canvas></div>';
  html+='</div>';

  // Filtros y lista
  html+='<div class="card"><div class="sl">Filtros</div><div class="frow">';
  ['todos','desayuno','almuerzo','cena'].forEach(function(t){
    html+='<button class="fb '+(filterTurno===t?'on':'')+'" onclick="setFilter(\''+t+'\')">'+( t==='todos'?'Todos':turnoLabel(t))+'</button>';
  });
  html+='</div><div class="field"><label>Por fecha</label><input type="date" value="'+filterDate+'" onchange="setFilterDate(this.value)" style="max-width:200px"></div></div>';
  html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">';
  html+='<div class="sl" style="margin:0">'+filtradas.length+' ventas</div>';
  html+='<div style="font-size:15px;font-weight:600;color:#0F6E56">'+fmt(totalFiltrado)+'</div></div>';
  html+='<div style="display:flex;gap:10px;margin-bottom:12px">';
  html+='<div style="flex:1;background:#f5f0ff;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#7b2fff;text-transform:uppercase;letter-spacing:1px">Yape</div><div style="font-size:16px;font-weight:600;color:#7b2fff">'+fmt(totalYape)+'</div></div>';
  html+='<div style="flex:1;background:#f0faf5;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#0F6E56;text-transform:uppercase;letter-spacing:1px">Efectivo</div><div style="font-size:16px;font-weight:600;color:#0F6E56">'+fmt(totalEfectivo)+'</div></div>';
  html+='</div>';
  if(filtradas.length===0){html+='<div class="empty">Sin ventas</div>';}
  else{filtradas.forEach(function(v){
    html+='<div class="row"><div><div class="rn">'+v.producto+'<span class="badge '+turnoClass(v.turno)+'">'+turnoLabel(v.turno)+'</span></div>';
    html+='<div class="rm">'+fmtDate(v.fecha)+' '+v.hora+' - '+v.cantidad+' x '+fmt(v.precioUnit)+(v.obs?' - '+v.obs:'');
    html+=(v.pago==='yape'?' · <span style="color:#7b2fff;font-weight:600">Yape</span>':' · Efectivo');
    html+='</div></div>';
    html+='<div style="display:flex;align-items:center;gap:6px"><div class="ra">'+fmt(v.total)+'</div>';
    if(!currentUser||currentUser.rol!=='cajero'){html+='<button class="btnd" onclick="eliminarVenta(\''+v.id+'\')">x</button>';}
    html+='</div></div>';
  });}
  html+='</div>';

  document.getElementById('historial').innerHTML=html;

  // Datos gastos para grafico
  var gDia7=[];
  for(var d=6;d>=0;d--){
    var dd2=new Date();dd2.setDate(dd2.getDate()-d);
    var ds2=dd2.toISOString().slice(0,10);
    gDia7.push(gastos.filter(function(g){return g.fecha===ds2;}).reduce(function(a,g){return a+g.monto;},0));
  }
  var gSem8=[];
  for(var w=7;w>=0;w--){
    var wS2=new Date();wS2.setDate(wS2.getDate()-wS2.getDay()-w*7);
    var wE2=new Date(wS2);wE2.setDate(wS2.getDate()+6);
    var ws2=wS2.toISOString().slice(0,10);var we2=wE2.toISOString().slice(0,10);
    gSem8.push(gastos.filter(function(g){return g.fecha>=ws2&&g.fecha<=we2;}).reduce(function(a,g){return a+g.monto;},0));
  }
  var gMes6=[];
  for(var m=5;m>=0;m--){
    var md2=new Date();md2.setDate(1);md2.setMonth(md2.getMonth()-m);
    var ms2=md2.getFullYear()+'-'+(md2.getMonth()+1<10?'0':'')+(md2.getMonth()+1);
    gMes6.push(gastos.filter(function(g){return g.fecha.slice(0,7)===ms2;}).reduce(function(a,g){return a+g.monto;},0));
  }
  // Guardar datos para switchReporte
  window._rDia={labels:labels7,data:dias7};
  window._rSem={labels:labelsS,data:semanas8};
  window._rMes={labels:labelsM,data:meses6};
  window._gDia=gDia7;window._gSem=gSem8;window._gMes=gMes6;
  window._chartInst=null;
  switchReporte('dia');
}

function switchReporte(tipo){
  ['dia','sem','mes'].forEach(function(t){
    var btn=document.getElementById('rt-'+t);
    if(!btn)return;
    if(t===tipo){btn.style.background='#8b0000';btn.style.color='#fff';btn.style.borderColor='#8b0000';}
    else{btn.style.background='#fff';btn.style.color='#555';btn.style.borderColor='#ddd';}
  });
  var src=tipo==='dia'?window._rDia:tipo==='sem'?window._rSem:window._rMes;
  var srcG=tipo==='dia'?window._gDia:tipo==='sem'?window._gSem:window._gMes;
  var ctx=document.getElementById('ventasChart');
  if(!ctx)return;
  if(window._chartInst){window._chartInst.destroy();}
  window._chartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:src.labels,
      datasets:[
        {label:'Ventas S/',data:src.data,backgroundColor:'rgba(139,0,0,0.75)',borderColor:'#8b0000',borderWidth:1,borderRadius:5},
        {label:'Gastos S/',data:srcG,backgroundColor:'rgba(163,45,45,0.35)',borderColor:'#A32D2D',borderWidth:1,borderRadius:5}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top'},tooltip:{callbacks:{label:function(c){return c.dataset.label+': S/ '+c.parsed.y.toFixed(2);}}}},
      scales:{y:{beginAtZero:true,ticks:{callback:function(v){return'S/'+v;}}}}
    }
  });
}

  var mes=getMes();

  html+='<div style="display:flex;gap:8px"><input type="number" id="new-pin" placeholder="Nuevo PIN" style="border:1px solid #e0d5c5;border-radius:8px;padding:7px 11px;font-size:14px;font-family:inherit;width:140px">';
  html+='<button class="btn" style="width:auto;padding:7px 16px;margin:0" onclick="cambiarPin(\''+emp.id+'\')">Guardar</button></div></div>';
  html+='</div>';
  html+='<nav class="sub-nav"><button class="snb '+(selectedEmpSubTab==='asistencia'?'on':'')+'" onclick="subTab(\'asistencia\')">Asistencia</button>';
  html+='<button class="snb '+(selectedEmpSubTab==='adelantos'?'on':'')+'" onclick="subTab(\'adelantos\')">Adelantos</button>';

function subTab(t){selectedEmpSubTab=t;render();}
function volverPersonal(){selectedEmpId=null;render();}

function renderSubAsistencia(emp,mes){
  var fechaFiltro=filterAsisDate||today();
  var asisEmp=asistencias.filter(function(a){return a.personalId===emp.id&&a.fecha===fechaFiltro});
  var ult=asisEmp.length?asisEmp[asisEmp.length-1]:null;
  var dc='dot-none',et='Sin registrar';
  if(ult){if(ult.estado==='asistio'){dc='dot-in';et='Asistio';}else if(ult.estado==='medio tiempo'){dc='dot-out';et='Medio tiempo';}else{dc='dot-abs';et='No asistio';}}
  var asisMes=asistencias.filter(function(a){return a.personalId===emp.id&&a.fecha.slice(0,7)===mes});
  var diasT=[];asisMes.forEach(function(a){if((a.estado==='asistio'||a.estado==='medio tiempo')&&diasT.indexOf(a.fecha)<0)diasT.push(a.fecha);});
  var diasF=[];asisMes.forEach(function(a){if(a.estado==='no asistio'&&diasF.indexOf(a.fecha)<0)diasF.push(a.fecha);});
  var html='<div class="card"><div class="sl">Asistencia — toca un dia</div>';
  html+='<div style="font-size:12px;color:#aaa;margin-bottom:10px">Toca cualquier dia del calendario para marcar</div>';
  html+='</div>';
  html+='<div class="card"><div class="sl">Resumen del mes</div>';
  html+='<div class="field"><label>Mes</label><input type="month" value="'+mes+'" onchange="setMes(this.value)" style="max-width:180px"></div>';

  // MINI CALENDARIO
  // Buscar ultimo pago del empleado
  var pagosEmp=pagos.filter(function(p){return p.personalId===emp.id;});
  var ultimoPago=null;
  if(pagosEmp.length){
    pagosEmp.sort(function(a,b){return b.fecha.localeCompare(a.fecha)||b.hora.localeCompare(a.hora);});
    ultimoPago=pagosEmp[0].fecha;
  }
  var calYear=parseInt(mes.slice(0,4));var calMonth=parseInt(mes.slice(5,7))-1;
  var firstDay=new Date(calYear,calMonth,1).getDay();
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var days=['D','L','M','M','J','V','S'];
  html+='<div style="margin:10px 0">';
  if(ultimoPago){
    html+='<div style="background:#f0faf5;border-radius:6px;padding:6px 10px;margin-bottom:8px;font-size:12px;color:#0F6E56">';
    html+='Contando desde último pago: <strong>'+fmtDate(ultimoPago)+'</strong></div>';
  }
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">';
  days.forEach(function(d){html+='<div style="text-align:center;font-size:10px;color:#aaa;font-weight:600">'+d+'</div>';});
  html+='</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  for(var i=0;i<firstDay;i++){html+='<div></div>';}
  for(var d=1;d<=daysInMonth;d++){
    var ds=calYear+'-'+(calMonth+1<10?'0':'')+(calMonth+1)+'-'+(d<10?'0':'')+d;
    var antesDelPago=ultimoPago&&ds<=ultimoPago;
    var isT=!antesDelPago&&diasT.indexOf(ds)>=0;
    var isF=!antesDelPago&&diasF.indexOf(ds)>=0;
    var isMed=false;
    if(!antesDelPago){asisMes.forEach(function(a){if(a.fecha===ds&&a.estado==='medio tiempo')isMed=true;});}
    var today2=today();
    var isToday=ds===today2;
    var bg=antesDelPago?'#e8e4de':isT?'#185FA5':isF?'#A32D2D':isMed?'#854F0B':'#f0ede8';
    var color=antesDelPago?'#bbb':(isT||isF||isMed)?'#fff':'#888';
    var border=isToday?'2px solid #8b0000':'2px solid transparent';
    var title=antesDelPago?'Ya pagado':'';
    var clickable=!antesDelPago;
    var cursor=clickable?'cursor:pointer;':'cursor:default;';
    var dataAttrs=clickable?' data-empid="'+emp.id+'" data-empnombre="'+emp.nombre+'" data-fecha="'+ds+'" onclick="abrirModalAsisDt(this)"':'';
    html+='<div title="'+title+'"'+dataAttrs+' style="'+cursor+'text-align:center;padding:5px 2px;border-radius:6px;background:'+bg+';color:'+color+';font-size:12px;border:'+border+';opacity:'+(antesDelPago?'0.5':'1')+'">'+d+'</div>';
  }
  html+='</div>';
  html+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#185FA5"></div><span style="font-size:11px;color:#555">Trabajó</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#854F0B"></div><span style="font-size:11px;color:#555">Medio tiempo</span></div>';
  html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:#A32D2D"></div><span style="font-size:11px;color:#555">Faltó</span></div>';
  html+='</div></div>';

  var diasTConteo=ultimoPago?diasT.filter(function(d){return d>ultimoPago;}):diasT;
  var diasFConteo=ultimoPago?diasF.filter(function(d){return d>ultimoPago;}):diasF;
  var diasMedConteo=ultimoPago?asisMes.filter(function(a){return a.estado==='medio tiempo'&&a.fecha>ultimoPago;}):asisMes.filter(function(a){return a.estado==='medio tiempo';});
  html+='<div class="row"><div class="rn">Dias trabajados</div><div class="ra">'+diasTConteo.length+'</div></div>';
  html+='<div class="row"><div class="rn">Medio tiempo</div><div style="font-size:14px;font-weight:600;color:#854F0B">'+diasMedConteo.length+'</div></div>';
  html+='<div class="row"><div class="rn">Faltas</div><div style="font-size:14px;font-weight:600;color:#A32D2D">'+diasFConteo.length+'</div></div></div>';
  var histMes=asisMes.slice().sort(function(a,b){return b.fecha.localeCompare(a.fecha)||b.hora.localeCompare(a.hora)});
  html+='<div class="card"><div class="sl">Historial del mes</div>';

function renderSubLiquidacion(emp,mes){
  var adEmp=adelantos.filter(function(a){return a.personalId===emp.id&&a.fecha.slice(0,7)===mes&&!a.liquidado});
  var paEmp=pagos.filter(function(a){return a.personalId===emp.id&&a.fecha.slice(0,7)===mes});
  var asisMes=asistencias.filter(function(a){return a.personalId===emp.id&&a.fecha.slice(0,7)===mes});
  var diasT=[];asisMes.forEach(function(a){if((a.estado==='asistio'||a.estado==='medio tiempo')&&diasT.indexOf(a.fecha)<0)diasT.push(a.fecha);});
  var diasF=[];asisMes.forEach(function(a){if(a.estado==='no asistio'&&diasF.indexOf(a.fecha)<0)diasF.push(a.fecha);});
  var totalAd=adEmp.reduce(function(a,x){return a+x.monto},0);
  var totalPa=paEmp.reduce(function(a,x){return a+x.monto},0);
  var sueldo=emp.sueldo||0;
  var saldo=sueldo-totalAd-totalPa;
  var html='<div class="card"><div class="sl">Liquidacion</div>';
  html+='<div class="field"><label>Mes</label><input type="month" value="'+mes+'" onchange="setMes(this.value)" style="max-width:180px"></div>';
  html+='<div class="resumen-box">';
  html+='<div class="resumen-row"><span>Sueldo base</span><span style="color:#0F6E56">'+fmt(sueldo)+'</span></div>';
  html+='<div class="resumen-row"><span>Dias trabajados</span><span>'+diasT.length+' dias</span></div>';
  html+='<div class="resumen-row"><span>Faltas</span><span style="color:#A32D2D">'+diasF.length+' dias</span></div>';
  html+='<div class="resumen-row"><span>Adelantos efectivo</span><span style="color:#185FA5">- '+fmt(adEmp.filter(function(a){return a.tipo==='efectivo'}).reduce(function(a,x){return a+x.monto},0))+'</span></div>';
  html+='<div class="resumen-row"><span>Adelantos productos</span><span style="color:#993556">- '+fmt(adEmp.filter(function(a){return a.tipo==='producto'}).reduce(function(a,x){return a+x.monto},0))+'</span></div>';
  html+='<div class="resumen-row"><span>Ya pagado</span><span style="color:#0F6E56">- '+fmt(totalPa)+'</span></div>';
  html+='<div class="resumen-row total"><span>SALDO A PAGAR</span><span style="color:'+(saldo<0?'#cc3333':'#0F6E56')+'">'+fmt(saldo)+'</span></div></div>';
  if(adEmp.length>0){
    html+='<button class="btn btn-g" style="margin-bottom:0" onclick="liquidarAdelantos(\''+emp.id+'\',\''+emp.nombre+'\',\''+mes+'\')">Marcar adelantos como pagados</button>';
  }
  var adLiq=adelantos.filter(function(a){return a.personalId===emp.id&&a.liquidado});
  var mLiq={};adLiq.forEach(function(a){var m=a.fecha.slice(0,7);mLiq[m]=(mLiq[m]||0)+a.monto;});
  var mArr=Object.keys(mLiq).sort().reverse();
  if(mArr.length>0){
    html+='<div class="card" style="margin-top:0"><div class="sl">Historial liquidados</div>';
    mArr.forEach(function(m){
      html+='<div class="row"><div class="rn">'+m+'</div><div><span class="tag-pa">Liquidado</span> <span style="font-size:13px;color:#aaa">'+fmt(mLiq[m])+'</span></div></div>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function calcAdTotal(){

  var opt=sel.options[sel.selectedIndex];

}
function guardarAdelanto(personalId,nombre){
  var tipo=document.getElementById('ad-tipo').value;
  var fecha=document.getElementById('ad-fecha').value||today();
  var nota=document.getElementById('ad-nota').value;
  var monto=0,descripcion='';
  if(tipo==='efectivo'){
    monto=parseFloat(document.getElementById('ad-monto').value)||0;
    descripcion='Adelanto efectivo';
  } else {
    var sel=document.getElementById('ad-prod');
    var opt=sel.options[sel.selectedIndex];
    var cant=parseFloat(document.getElementById('ad-cant').value)||1;
    monto=cant*(parseFloat(opt.dataset.precio)||0);
    descripcion=cant+' x '+opt.dataset.nombre;
  }
  if(monto<=0){showToast('Monto invalido',true);return;}
  db.ref('adelantos').push({personalId:personalId,nombre:nombre,tipo:tipo,monto:monto,descripcion:descripcion,fecha:fecha,hora:nowTime(),nota:nota,liquidado:false,timestamp:new Date().toISOString()})
    .then(function(){showToast('Adelanto registrado - '+fmt(monto));});
}

  html+='<button id="gpago-yp" onclick="selGastoPago(\'yape\')" style="flex:1;padding:10px;border-radius:8px;border:2px solid #ddd;background:#fff;color:#555;cursor:pointer;font-size:14px">Yape</button>';
  html+='</div></div>';

  html+='</div>';

  // Filtro de periodo

  });

  else{
    gastosVista.slice().reverse().forEach(function(g){
      html+='<div class="row"><div>';
      html+='<div class="rn">'+g.descripcion+'</div>';
      html+='<div class="rm">'+fmtDate(g.fecha)+' '+g.hora+(g.pago==='yape'?' · <span style="color:#7b2fff">Yape</span>':' · Efectivo')+(g.registradoPor?' · '+g.registradoPor:'')+'</div>';

      html+='</div></div>';
    });

  gastosHoyEx.forEach(function(g){grow+='<tr><td>'+g.hora+'</td><td colspan="3">'+g.descripcion+'</td><td>'+fmt(g.monto)+'</td><td>'+(g.pago==='yape'?'Yape':'Efectivo')+'</td></tr>';});
  win.document.write('<html><head><title>Reporte '+fecha+'</title><style>body{font-family:Arial,sans-serif;font-size:12px;padding:20px}h1{color:#8b0000;font-size:20px}h2{color:#555;font-size:14px;margin-top:20px}table{width:100%;border-collapse:collapse;margin-top:8px}th{background:#8b0000;color:#fff;padding:6px;text-align:left}td{padding:5px;border-bottom:1px solid #eee}.total{font-size:14px;font-weight:bold;margin-top:10px}.saldo{font-size:16px;font-weight:bold;color:'+(totalV-totalG>=0?'#0F6E56':'#A32D2D')+';margin-top:10px}</style></head><body>');
  win.document.write('<h1>Mary — Reporte del dia</h1><p>Fecha: '+fecha+' | Generado: '+nowTime()+'</p>');
  win.document.write('<h2>Ventas</h2><table><tr><th>Hora</th><th>Producto</th><th>Cant</th><th>Precio</th><th>Total</th><th>Pago</th></tr>'+rows+'</table>');
  win.document.write('<div class="total">Total ventas: '+fmt(totalV)+'</div>');
  win.document.write('<h2>Gastos</h2><table><tr><th>Hora</th><th>Descripcion</th><th></th><th></th><th>Monto</th><th>Pago</th></tr>'+grow+'</table>');
  win.document.write('<div class="total" style="color:#A32D2D">Total gastos: '+fmt(totalG)+'</div>');
  win.document.write('<div class="saldo">Saldo en caja: '+fmt(totalV-totalG)+'</div>');
  win.document.write('</body></html>');
  win.document.close();
  win.print();
}

function exportarGastosCSV(){
  var rows=[['Fecha','Hora','Descripcion','Monto','Pago','Registrado por']];
  gastos.forEach(function(g){rows.push([g.fecha,g.hora,g.descripcion,g.monto,g.pago,g.registradoPor||'']);});
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='gastos-mary-'+today()+'.csv';a.click();
  URL.revokeObjectURL(url);
}

function exportarVentasCSV(){
  var rows=[['Fecha','Hora','Producto','Cantidad','Precio','Total','Pago','Turno']];
  ventas.forEach(function(v){rows.push([v.fecha,v.hora,v.producto,v.cantidad,v.precioUnit,v.total,v.pago,v.turno]);});
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='ventas-mary-'+today()+'.csv';a.click();
  URL.revokeObjectURL(url);
}

function selGastoPago(tipo){
  window._gastoPago=tipo;
  var ef=document.getElementById('gpago-ef');
  var yp=document.getElementById('gpago-yp');
  if(tipo==='efectivo'){
    ef.style.background='#8b0000';ef.style.color='#fff';ef.style.borderColor='#8b0000';
    yp.style.background='#fff';yp.style.color='#555';yp.style.borderColor='#ddd';
  } else {
    yp.style.background='#7b2fff';yp.style.color='#fff';yp.style.borderColor='#7b2fff';
    ef.style.background='#fff';ef.style.color='#555';ef.style.borderColor='#ddd';
  }
}

function guardarGasto(){
  var desc=document.getElementById('gasto-desc').value.trim();
  var monto=parseFloat(document.getElementById('gasto-monto').value)||0;
  if(!desc){showToast('Escribe que se va a comprar');return;}
  if(monto<=0){showToast('Ingresa un monto valido');return;}
  var pago=window._gastoPago||'efectivo';
  db.ref('gastos').push({
    descripcion:desc,
    monto:monto,
    pago:pago,
    fecha:today(),
    hora:nowTime(),
    registradoPor:currentUser?currentUser.nombre:'',
    timestamp:new Date().toISOString()
  }).then(function(){
    showToast('Gasto registrado: '+fmt(monto));
    document.getElementById('gasto-desc').value='';
    document.getElementById('gasto-monto').value='';
  });
}

function eliminarGasto(id){
  if(!confirm('¿Eliminar este gasto?'))return;
  db.ref('gastos/'+id).remove().then(function(){showToast('Gasto eliminado');});
}

function renderProductos(){
  var html='<div class="card"><div class="sl">Agregar producto</div>';
  html+='<div class="g2"><div class="field"><label>Nombre</label><input type="text" id="pp-nom" placeholder="Ej: Arroz con leche"></div>';
  html+='<div class="field"><label>Precio (S/)</label><input type="number" id="pp-precio" placeholder="0.00" step="0.5"></div></div>';
  html+='<div class="field"><label>Turno</label><select id="pp-turno"><option value="desayuno">Desayuno</option><option value="almuerzo" selected>Almuerzo</option><option value="cena">Cena</option><option value="otro">Otro</option></select></div>';
  html+='<button class="btn" onclick="agregarProducto()">Agregar producto</button></div>';
  html+='<div class="card"><div class="sl">Lista de productos ('+productos.length+')</div>';
  if(productos.length===0){html+='<div class="empty">Sin productos</div>';}
  else{productos.forEach(function(p){
    html+='<div class="prod-row"><div><div class="rn">'+p.nombre+'<span class="badge '+turnoClass(p.turno)+'">'+turnoLabel(p.turno)+'</span></div></div>';
    html+='<div style="display:flex;align-items:center;gap:8px"><input class="inp-sm" type="number" value="'+p.precio+'" step="0.5" onchange="editarPrecio(\''+p.id+'\',this.value)">';
    html+='<button class="btnd" onclick="eliminarProducto(\''+p.id+'\')">x</button></div></div>';
  });}
  html+='</div>';
  document.getElementById('productos').innerHTML=html;
}
function agregarProducto(){
  var nom=document.getElementById('pp-nom').value.trim();
  var precio=parseFloat(document.getElementById('pp-precio').value)||0;
  var turno=document.getElementById('pp-turno').value;
  if(!nom||precio<=0){showToast('Completa nombre y precio',true);return;}
  db.ref('productos').push({nombre:nom,precio:precio,turno:turno}).then(function(){showToast('Producto agregado');});
}
function eliminarProducto(id){
  if(!confirm('Eliminar?'))return;
  db.ref('productos/'+id).remove().then(function(){showToast('Eliminado');});
}
function editarPrecio(id,val){
  var precio=parseFloat(val);if(!precio||precio<=0)return;
  db.ref('productos/'+id).update({precio:precio}).then(function(){showToast('Precio actualizado');});
}
</script>
